<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery-DL Download Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .emerald-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .console-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @keyframes pulse-emerald {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-pulse {
            animation: pulse-emerald 2s infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const LucideIcon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [urls, setUrls] = useState("");
            const [isRunning, setIsRunning] = useState(false);
            const [log, setLog] = useState([]);
            const [config, setConfig] = useState("");
            const [activeTab, setActiveTab] = useState('download'); // 'download' | 'settings'
            const [isUpdating, setIsUpdating] = useState(false);
            const [history, setHistory] = useState([]);
            const [subscriptions, setSubscriptions] = useState([]);
            const [subInterval, setSubInterval] = useState(1);
            const [minFreeGB, setMinFreeGB] = useState(10);
            const [leftTab, setLeftTab] = useState('queue'); // 'queue' | 'history' | 'subscriptions'
            const [serverUrl] = useState(window.location.origin);
            const logEndRef = useRef(null);

            const scrollToBottom = () => {
                logEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [log]);

            // Sync status
            useEffect(() => {
                const checkStatus = async () => {
                    try {
                        const res = await fetch(`${serverUrl}/api/downloads/status`);
                        if (res.ok) {
                            const data = await res.json();
                            setIsRunning(data.running);
                            setLog(data.log || []);
                        }
                    } catch (e) {
                        console.error("Status check failed", e);
                    }
                };
                checkStatus();
                const interval = setInterval(checkStatus, 2000);
                return () => clearInterval(interval);
            }, []);

            // Fetch config
            useEffect(() => {
                const fetchConfig = async () => {
                    try {
                        const res = await fetch(`${serverUrl}/api/downloads/config`);
                        if (res.ok) {
                            const data = await res.json();
                            setConfig(data.config);
                        }
                    } catch (e) { }
                };
                fetchConfig();
            }, []);

            // Fetch history
            const fetchHistory = async () => {
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/history`);
                    if (res.ok) {
                        const data = await res.json();
                        setHistory(data.history || []);
                    }
                } catch (e) { }
            };

            useEffect(() => {
                fetchHistory();
                const interval = setInterval(fetchHistory, 5000);
                return () => clearInterval(interval);
            }, []);

            const fetchSubscriptions = async () => {
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/subscriptions`);
                    if (res.ok) {
                        const data = await res.json();
                        setSubscriptions(data.subscriptions || []);
                    }
                } catch (e) { }
            };

            useEffect(() => {
                fetchSubscriptions();
                const interval = setInterval(fetchSubscriptions, 10000);
                return () => clearInterval(interval);
            }, []);

            const fetchSettings = async () => {
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/settings`);
                    if (res.ok) {
                        const data = await res.json();
                        setMinFreeGB(data.settings?.min_free_gb || 0);
                    }
                } catch (e) { }
            };

            useEffect(() => {
                fetchSettings();
            }, []);

            const saveSettings = async (newMinFree) => {
                try {
                    await fetch(`${serverUrl}/api/downloads/settings`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ settings: { min_free_gb: newMinFree } })
                    });
                } catch (e) { }
            };

            const handleMinFreeChange = (val) => {
                const newMinFree = Math.max(0, val);
                setMinFreeGB(newMinFree);
                saveSettings(newMinFree);
            };

            const saveSubscriptions = async (subs) => {
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/subscriptions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subscriptions: subs })
                    });
                    if (res.ok) {
                        setSubscriptions(subs);
                    }
                } catch (e) {
                    alert("Failed to save subscriptions");
                }
            };

            const addSubscription = () => {
                if (!urls.trim()) return;
                const urlList = urls.split('\n').map(u => u.trim()).filter(u => u);
                const newSubs = [...subscriptions];
                for (const u of urlList) {
                    if (!newSubs.find(s => s.url === u)) {
                        newSubs.push({ url: u, interval: subInterval, last_polled: 0 });
                    }
                }
                saveSubscriptions(newSubs);
                setUrls("");
                setLeftTab('subscriptions');
            };

            const removeSubscription = (url) => {
                const newSubs = subscriptions.filter(s => s.url !== url);
                saveSubscriptions(newSubs);
            };

            const startDownload = async (force = false) => {
                if (!urls.trim() || isRunning) return;
                
                if (force && !confirm("DEEP SCAN PROTOCOL: This will ignore the download archive and try to re-download every file, potentially creating duplicates. Proceed?")) {
                    return;
                }

                const urlList = urls.split('\n').map(u => u.trim()).filter(u => u);
                if (urlList.length === 0) return;

                setIsRunning(true);
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/run`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ urls: urlList, force })
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        alert("Download failed to start: " + err.error);
                        setIsRunning(false);
                    }
                } catch (e) {
                    alert("Connection error");
                    setIsRunning(false);
                }
            };

            const stopDownload = async () => {
                if (!isRunning) return;
                try {
                    await fetch(`${serverUrl}/api/downloads/status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ running: false })
                    });
                    setIsRunning(false);
                } catch (e) {
                    alert("Stop request failed");
                }
            };

            const saveConfig = async () => {
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/config`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ config })
                    });
                    if (res.ok) {
                        alert("Configuration saved successfully.");
                    }
                } catch (e) {
                    alert("Failed to save config");
                }
            };

            const updateApp = async () => {
                if (isRunning) return;
                setIsUpdating(true);
                try {
                    const res = await fetch(`${serverUrl}/api/downloads/update`, { method: 'POST' });
                    if (res.ok) {
                        // Status polling will pick up the log
                    }
                } catch (e) {
                    alert("Update request failed");
                } finally {
                    setIsUpdating(false);
                }
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* Header */}
                    <header className="glass h-16 flex items-center justify-between px-8 z-50 shrink-0">
                        <div className="flex items-center gap-6">
                            <button 
                                onClick={() => window.location.href = 'visualizer.html'}
                                className="w-10 h-10 rounded-xl bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition-all group"
                            >
                                <LucideIcon name="arrow-left" className="w-5 h-5 text-slate-400 group-hover:text-white" />
                            </button>
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                    <LucideIcon name="download" className="text-white w-5 h-5" />
                                </div>
                                <h1 className="font-black tracking-tighter text-xl uppercase italic text-white">Download Manager</h1>
                            </div>
                        </div>

                        <div className="flex items-center gap-6">
                            <div className="flex bg-slate-900/80 p-1 rounded-xl border border-white/5">
                                <button
                                    onClick={() => setActiveTab('download')}
                                    className={`px-6 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center gap-2 ${activeTab === 'download' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                >
                                    <LucideIcon name="download-cloud" className="w-3.5 h-3.5" />
                                    Queue
                                </button>
                                <button
                                    onClick={() => setActiveTab('settings')}
                                    className={`px-6 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center gap-2 ${activeTab === 'settings' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                >
                                    <LucideIcon name="settings" className="w-3.5 h-3.5" />
                                    Config
                                </button>
                            </div>
                            
                            <div className="flex items-center gap-3 pl-6 border-l border-white/10">
                                {isRunning ? (
                                    <div className="flex items-center gap-2">
                                        <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                                            <div className="w-2 h-2 rounded-full bg-emerald-500 status-pulse"></div>
                                            <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">
                                                {(() => {
                                                    const progressLine = [...log].reverse().find(l => l.includes('[GDL] ['));
                                                    if (progressLine) {
                                                        const match = progressLine.match(/\[(\d+\/\d+)\]/);
                                                        return match ? `Downloading ${match[1]}` : 'Active';
                                                    }
                                                    return 'Active';
                                                })()}
                                            </span>
                                        </div>
                                        <button 
                                            onClick={stopDownload}
                                            className="px-3 py-1.5 rounded-full bg-rose-500/10 border border-rose-500/20 text-rose-500 text-[10px] font-black uppercase tracking-widest hover:bg-rose-500 hover:text-white transition-all"
                                        >
                                            Stop
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 border border-white/5">
                                        <div className="w-2 h-2 rounded-full bg-slate-600"></div>
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Idle</span>
                                    </div>
                                )}
                                <button 
                                    onClick={updateApp}
                                    disabled={isRunning}
                                    className="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center hover:bg-indigo-500/20 transition-all group disabled:opacity-50"
                                    title="Check for updates"
                                >
                                    <LucideIcon name="refresh-cw" className={`w-4 h-4 text-indigo-400 group-hover:rotate-180 transition-all duration-500 ${isRunning ? 'animate-spin' : ''}`} />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden p-8 gap-8">
                        {activeTab === 'download' ? (
                            <>
                                {/* Left: URL Input */}
                                <div className="w-1/3 flex flex-col gap-6">
                                    <div className="glass rounded-3xl p-8 flex-1 flex flex-col gap-6 relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 blur-3xl rounded-full -translate-y-1/2 translate-x-1/2 group-hover:bg-emerald-500/10 transition-colors"></div>
                                        
                                        <div className="flex items-center gap-4 mb-2 p-1 bg-slate-900/60 rounded-xl border border-white/5 w-fit">
                                            <button
                                                onClick={() => setLeftTab('queue')}
                                                className={`px-4 py-1.5 text-[9px] font-black uppercase tracking-wider rounded-lg transition-all ${leftTab === 'queue' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                            >
                                                Active Queue
                                            </button>
                                            <button
                                                onClick={() => setLeftTab('history')}
                                                className={`px-4 py-1.5 text-[9px] font-black uppercase tracking-wider rounded-lg transition-all ${leftTab === 'history' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                            >
                                                Link History
                                            </button>
                                            <button
                                                onClick={() => setLeftTab('subscriptions')}
                                                className={`px-4 py-1.5 text-[9px] font-black uppercase tracking-wider rounded-lg transition-all ${leftTab === 'subscriptions' ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                            >
                                                Subscriptions
                                            </button>
                                        </div>

                                        {leftTab === 'queue' ? (
                                            <div className="relative flex-1 flex flex-col">
                                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                                    <LucideIcon name="link" className="w-3.5 h-3.5 text-emerald-500" />
                                                    Target URLs
                                                </h3>
                                                <p className="text-[10px] text-slate-500 font-medium mb-4 leading-relaxed">
                                                    Paste one or more gallery links below. gallery-dl will automatically handle extraction.
                                                </p>
                                                <textarea
                                                    className="w-full flex-1 bg-black/30 border border-white/5 rounded-2xl p-4 text-xs font-mono text-emerald-400/80 focus:outline-none focus:border-emerald-500/30 transition-all resize-none shadow-inner"
                                                    placeholder="https://imgur.com/gallery/...\nhttps://www.instagram.com/...\netc."
                                                    value={urls}
                                                    onChange={(e) => setUrls(e.target.value)}
                                                    disabled={isRunning}
                                                />
                                            </div>
                                        ) : leftTab === 'history' ? (
                                            <div className="relative flex-1 flex flex-col overflow-hidden">
                                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                                    <LucideIcon name="history" className="w-3.5 h-3.5 text-emerald-500" />
                                                    Past Downloads
                                                </h3>
                                                <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                                    {history.length === 0 && (
                                                        <div className="py-20 text-center opacity-20">
                                                            <LucideIcon name="database" className="w-8 h-8 mx-auto mb-2" />
                                                            <p className="text-[10px] uppercase font-black tracking-widest">No History Stored</p>
                                                        </div>
                                                    )}
                                                    {history.map((entry, idx) => {
                                                        const isError = entry.status && entry.status.includes('Error');
                                                        return (
                                                            <div key={idx} className={`p-4 bg-white/5 rounded-2xl border transition-all group/item ${isError ? 'border-rose-500/20 bg-rose-500/5' : 'border-white/5 hover:border-emerald-500/20'}`}>
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <span className="text-[9px] font-bold text-slate-500">{entry.timestamp}</span>
                                                                    <span className={`text-[9px] font-black px-2 py-0.5 rounded-full ${isError ? 'bg-rose-500/20 text-rose-500 shadow-lg shadow-rose-500/10 animate-pulse' : 'bg-emerald-500/10 text-emerald-500'}`}>
                                                                        {isError ? 'FAILED' : `${entry.count} Files`}
                                                                    </span>
                                                                </div>
                                                                <div className={`text-[10px] line-clamp-2 font-mono mb-3 opacity-70 ${isError ? 'text-rose-300' : 'text-slate-300'}`}>
                                                                    {entry.urls.join(', ')}
                                                                </div>
                                                                <div className="flex gap-2">
                                                                    <button
                                                                        onClick={() => {
                                                                            setUrls(entry.urls.join('\n'));
                                                                            setLeftTab('queue');
                                                                        }}
                                                                        className={`flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all ${isError ? 'bg-rose-600 hover:bg-rose-500 text-white' : 'bg-slate-800 hover:bg-emerald-500 text-slate-400 hover:text-white'}`}
                                                                    >
                                                                        {isError ? 'Retry Link' : 'Re-queue Link'}
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="relative flex-1 flex flex-col overflow-hidden">
                                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                                    <LucideIcon name="clock" className="w-3.5 h-3.5 text-emerald-500" />
                                                    Auto-Poll Subscriptions
                                                </h3>
                                                <p className="text-[10px] text-slate-500 font-medium mb-4 leading-relaxed shrink-0">
                                                    Links below are polled in the background for new items.
                                                </p>
                                                
                                                <div className="flex items-center gap-3 mb-4 shrink-0 bg-rose-500/5 border border-rose-500/10 p-3 rounded-xl">
                                                    <LucideIcon name="hard-drive" className="w-4 h-4 text-rose-400" />
                                                    <div className="flex-1">
                                                        <div className="text-[9px] font-black uppercase tracking-widest text-rose-400 mb-0.5">Safety Protocol</div>
                                                        <div className="text-[8px] text-slate-400 font-medium">Pause polling if free space falls below limit</div>
                                                    </div>
                                                    <div className="flex items-center bg-black/40 border border-white/5 rounded-lg overflow-hidden shrink-0">
                                                        <input 
                                                            type="number" 
                                                            className="w-12 bg-transparent text-center text-xs font-mono focus:outline-none py-1 text-slate-300" 
                                                            value={minFreeGB}
                                                            onChange={(e) => handleMinFreeChange(parseInt(e.target.value) || 0)}
                                                        />
                                                        <span className="text-[9px] font-bold text-slate-500 pr-2">GB</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex gap-2 mb-4 shrink-0">
                                                    <textarea
                                                        className="flex-1 bg-black/30 border border-white/5 rounded-xl p-3 text-xs font-mono text-emerald-400/80 focus:outline-none focus:border-emerald-500/30 transition-all resize-none shadow-inner h-12"
                                                        placeholder="URL to subscribe to..."
                                                        value={urls}
                                                        onChange={(e) => setUrls(e.target.value)}
                                                    />
                                                    <div className="flex flex-col gap-1 w-20">
                                                        <span className="text-[8px] font-black uppercase text-slate-500 text-center">Interval (hrs)</span>
                                                        <div className="flex items-center bg-black/30 border border-white/5 rounded-lg overflow-hidden flex-1">
                                                            <button 
                                                                onClick={() => setSubInterval(Math.max(1, subInterval - 1))}
                                                                className="w-6 hover:bg-white/10 flex items-center justify-center text-slate-400"
                                                            >-</button>
                                                            <input 
                                                                type="number" 
                                                                className="w-8 bg-transparent text-center text-xs font-mono focus:outline-none" 
                                                                value={subInterval}
                                                                readOnly
                                                            />
                                                            <button 
                                                                onClick={() => setSubInterval(subInterval + 1)}
                                                                className="w-6 hover:bg-white/10 flex items-center justify-center text-slate-400"
                                                            >+</button>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <button
                                                    onClick={addSubscription}
                                                    disabled={!urls.trim()}
                                                    className={`w-full py-2 mb-4 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all ${!urls.trim() ? 'bg-slate-800 text-slate-600' : 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-white border border-emerald-500/30'}`}
                                                >
                                                    Add Subscription
                                                </button>

                                                <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                                    {subscriptions.length === 0 && (
                                                        <div className="py-10 text-center opacity-20">
                                                            <LucideIcon name="bookmark" className="w-8 h-8 mx-auto mb-2" />
                                                            <p className="text-[10px] uppercase font-black tracking-widest">No Active Subscriptions</p>
                                                        </div>
                                                    )}
                                                    {subscriptions.map((sub, idx) => {
                                                        const lastPolled = sub.last_polled ? new Date(sub.last_polled * 1000).toLocaleString() : 'Never';
                                                        const fileCount = sub.last_count !== undefined ? sub.last_count : 0;
                                                        const mbSize = sub.last_size_mb !== undefined ? sub.last_size_mb.toFixed(1) : "0.0";
                                                        return (
                                                            <div key={idx} className="p-3 bg-white/5 rounded-2xl border border-white/5 hover:border-emerald-500/20 transition-all group">
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <span className="text-[9px] font-bold text-slate-500">Every {sub.interval}h</span>
                                                                    <button 
                                                                        onClick={() => removeSubscription(sub.url)}
                                                                        className="text-[9px] font-black px-2 py-0.5 rounded-full bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all opacity-0 group-hover:opacity-100"
                                                                    >
                                                                        Remove
                                                                    </button>
                                                                </div>
                                                                <div className="text-[10px] line-clamp-1 font-mono mb-2 text-slate-300">
                                                                    {sub.url}
                                                                </div>
                                                                <div className="text-[8px] font-bold text-slate-600 uppercase flex items-center justify-between">
                                                                    <span>Last Checked: {lastPolled}</span>
                                                                    {sub.last_polled && (
                                                                        <span className="text-emerald-500/70">
                                                                            +{fileCount} items ({mbSize} MB)
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {leftTab !== 'subscriptions' && (
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={() => startDownload(false)}
                                                    disabled={isRunning || !urls.trim()}
                                                    className={`flex-[2] py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3 ${isRunning || !urls.trim() || leftTab === 'history' ? 'bg-slate-800 text-slate-600' : 'bg-gradient-to-r from-emerald-600 to-teal-600 text-white shadow-xl shadow-emerald-900/20 hover:scale-[1.02] active:scale-[0.98]'}`}
                                                >
                                                    <LucideIcon name={isRunning ? 'loader-2' : 'play-circle'} className={`w-5 h-5 ${isRunning ? 'animate-spin' : ''}`} />
                                                    {isRunning ? 'Processing...' : 'Engage'}
                                                </button>
                                                <button
                                                    onClick={() => startDownload(true)}
                                                    disabled={isRunning || !urls.trim()}
                                                    className={`flex-1 py-4 rounded-2xl font-black text-[9px] uppercase tracking-widest transition-all border ${isRunning || !urls.trim() || leftTab === 'history' ? 'bg-slate-900/40 border-slate-800 text-slate-700' : 'bg-rose-500/10 border-rose-500/30 text-rose-500 hover:bg-rose-500 hover:text-white shadow-lg shadow-rose-900/10'}`}
                                                    title="Force re-scan and ignore archive"
                                                >
                                                    Force
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Sub-card: Pro Tip */}
                                    <div className="glass rounded-2xl p-6 bg-indigo-500/5 border-indigo-500/10">
                                        <div className="flex gap-4 items-start">
                                            <div className="w-12 h-12 shrink-0 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400">
                                                <LucideIcon name="lightbulb" className="w-6 h-6" />
                                            </div>
                                            <div>
                                                <h4 className="text-[11px] font-black text-indigo-400 uppercase tracking-widest mb-1">Expert Protocol</h4>
                                                <p className="text-[10px] text-slate-400 leading-relaxed font-medium">
                                                    Ensure you have configured your credentials in the <span className="text-indigo-400 font-bold">Config</span> tab for private galleries like Instagram or Twitter.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        ) : (
                                <div className="w-full h-full flex flex-col gap-6">
                                    <div className="glass rounded-3xl p-8 flex-1 flex flex-col gap-4 relative overflow-hidden">
                                        <div className="flex items-center justify-between mb-2">
                                            <div>
                                                <h3 className="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                                                    <LucideIcon name="file-json" className="w-4 h-4 text-emerald-500" />
                                                    gallery-dl.conf
                                                </h3>
                                                <p className="text-[10px] text-slate-500 mt-1 uppercase font-black tracking-tighter">Application-specific configuration overrides</p>
                                            </div>
                                            <button
                                                onClick={saveConfig}
                                                className="px-6 py-2.5 bg-emerald-500 text-black rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all shadow-lg shadow-emerald-500/10"
                                            >
                                                Commit Config
                                            </button>
                                        </div>
                                        <textarea
                                            className="w-full flex-1 bg-black/40 border border-white/5 rounded-2xl p-6 text-xs font-mono text-slate-300 focus:outline-none focus:border-emerald-500/30 transition-all resize-none shadow-inner"
                                            value={config}
                                            onChange={(e) => setConfig(e.target.value)}
                                            placeholder={`{\n    "extractor": {\n        "base-directory": "./downloads/",\n        "instagram": {\n            "username": "...",\n            "password": "..."\n        }\n    }\n}`}
                                        />
                                    </div>
                                </div>
                            )}

                            {activeTab === 'download' && (
                                <div className="flex-1 flex flex-col bg-slate-950/50 rounded-3xl border border-white/5 overflow-hidden shadow-2xl relative">
                                    <div className="h-12 flex items-center justify-between px-6 bg-slate-900/50 border-b border-white/5 shrink-0">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Live System Output</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="text-[9px] font-mono text-slate-600 uppercase">Buffer: {log.length} lines</span>
                                            <button onClick={() => setLog([])} className="text-[9px] font-black text-slate-600 hover:text-white uppercase tracking-tighter transition-colors">Clear Buffer</button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto p-6 scrollbar-thin scrollbar-thumb-white/5">
                                        <div className="console-log space-y-1">
                                            {log.length === 0 && (
                                                <div className="h-full flex flex-col items-center justify-center opacity-20 py-20">
                                                    <LucideIcon name="terminal" className="w-12 h-12 mb-4" />
                                                    <p className="text-xs font-black uppercase tracking-widest">Awaiting Command Stream...</p>
                                                </div>
                                            )}
                                            {log.map((line, idx) => {
                                                const isError = line.toLowerCase().includes('error') || line.toLowerCase().includes('failed');
                                                const isSuccess = line.toLowerCase().includes('finished') || line.toLowerCase().includes('complete');
                                                const isPath = line.includes('downloads/');
                                                
                                                return (
                                                    <div key={idx} className="flex gap-4 group hover:bg-white/5 transition-colors rounded px-2 -mx-2">
                                                        <span className="shrink-0 w-8 text-[9px] text-slate-700 font-mono text-right select-none">{idx + 1}</span>
                                                        <span className={`break-all ${isError ? 'text-rose-400 font-bold' : isSuccess ? 'text-emerald-400 font-bold' : isPath ? 'text-indigo-400' : 'text-slate-400'}`}>
                                                            {line}
                                                        </span>
                                                    </div>
                                                );
                                            })}
                                            <div ref={logEndRef} />
                                        </div>
                                    </div>

                                    {isRunning && (
                                        <div className="h-1 bg-slate-900 relative">
                                            <div className="absolute inset-0 bg-emerald-500/40 animate-[shimmer_2s_infinite]"></div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            const rootElement = document.getElementById('root');
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        </script>

        <style>
            @keyframes shimmer {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
        </style>
</body>

</html>
