                        <div className={`p-6 border-b border-white/5 bg-gradient-to-b from-slate-900/50 to-transparent ${isTuningCollapsed ? 'hidden' : ''}`}>
                            <div className="flex items-center gap-3 mb-6 relative app-menu-container">
                                <button
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    className="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20 hover:scale-105 transition-all active:scale-95"
                                >
                                    <LucideIcon name="sliders" className="text-white w-5 h-5" />
                                </button>
                                <h2 className="text-lg font-bold text-white tracking-tight">Tuning Lab</h2>

                                {isMenuOpen && (
                                    <div className="absolute top-12 left-0 w-48 bg-slate-800/95 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl z-[100] py-2 animate-in fade-in slide-in-from-top-2 duration-200">
                                        <button
                                            onClick={loadLatestLog}
                                            className="w-full px-4 py-2.5 text-left text-[11px] font-bold text-slate-300 hover:bg-white/5 flex items-center gap-3 transition-colors"
                                        >
                                            <LucideIcon name="zap" className="w-4 h-4 text-amber-500" />
                                            Load Latest Log
                                        </button>
                                        <button
                                            onClick={triggerFileLoad}
                                            className="w-full px-4 py-2.5 text-left text-[11px] font-bold text-slate-300 hover:bg-white/5 flex items-center gap-3 transition-colors"
                                        >
                                            <LucideIcon name="file-up" className="w-4 h-4 text-amber-500" />
                                            Load Log File...
                                        </button>
                                        <div className="h-px bg-white/5 my-1 mx-2"></div>
                                        <button
                                            onClick={browseLogs}
                                            className="w-full px-4 py-2.5 text-left text-[11px] font-bold text-slate-300 hover:bg-white/5 flex items-center gap-3 transition-colors"
                                        >
                                            <LucideIcon name="external-link" className="w-4 h-4 text-slate-500" />
                                            Browse Logs Folder
                                        </button>
                                        <button
                                            onClick={() => window.open('slideshow.html', '_blank')}
                                            className="w-full px-4 py-2.5 text-left text-[11px] font-bold text-slate-300 hover:bg-white/5 flex items-center gap-3 transition-colors"
                                        >
                                            <LucideIcon name="palette" className="w-4 h-4 text-amber-500" />
                                            Slideshow Viewer
                                        </button>
                                        <div className="h-px bg-white/5 my-1 mx-2"></div>
                                        <button
                                            onClick={() => window.open('downloads.html', '_blank')}
                                            className="w-full px-4 py-2.5 text-left text-[11px] font-bold text-slate-300 hover:bg-white/5 flex items-center gap-3 transition-colors"
                                        >
                                            <LucideIcon name="download" className="w-4 h-4 text-emerald-500" />
                                            Download Manager
                                        </button>
                                        <input
                                            type="file"
                                            id="hidden-log-picker"
                                            className="hidden"
                                            accept=".csv"
                                            onChange={handleFileUpload}
                                        />
                                    </div>
                                )}
                            </div>

                            {/* Tab Switcher */}
                            <div className="flex bg-slate-900/80 p-1 rounded-xl border border-white/5 mb-6">
                                <button
                                    onClick={() => setTuningTab('params')}
                                    className={`flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center justify-center gap-2 ${tuningTab === 'params' ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                >
                                    <LucideIcon name="list" className="w-3.5 h-3.5" />
                                    Static Params
                                </button>
                                <button
                                    onClick={() => setTuningTab('pipeline')}
                                    className={`flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all flex items-center justify-center gap-2 ${tuningTab === 'pipeline' ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/10' : 'text-slate-500 hover:text-slate-400'}`}
                                >
                                    <LucideIcon name="git-branch" className="w-3.5 h-3.5" />
                                    Pipeline Tree
                                </button>
                            </div>

                            {/* Action Panel */}
                            <div className="flex flex-col gap-3 bg-slate-900/40 p-4 rounded-xl border border-white/5 shadow-inner">
                                <div className="space-y-1.5">
                                    <div className="flex items-center gap-2 group relative">
                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{isQueueMode ? 'Batch Queue File' : 'Source Folder'}</span>
                                        <div className="relative group/tooltip">
                                            <LucideIcon name="info" className="w-3 h-3 text-slate-600 hover:text-amber-500 cursor-help transition-colors" />
                                            <div className="absolute left-6 top-1/2 -translate-y-1/2 w-52 p-2.5 bg-slate-800 text-[9px] text-slate-300 rounded-lg border border-slate-700 shadow-2xl opacity-0 group-hover/tooltip:opacity-100 pointer-events-none transition-all z-50 leading-relaxed normal-case font-normal">
                                                {isQueueMode ? 'Paste a path to a .txt file containing one folder path per line. Lines starting with # are ignored.' : 'Simulate first to verify groupings. Commit will permanently move/copy files.'}
                                            </div>
                                        </div>
                                        <div className="flex-1">
                                            {batchIndex >= 0 && (
                                                <div className="text-[8px] font-black text-emerald-400 uppercase tracking-widest text-right truncate animate-pulse">
                                                    Queue {batchIndex + 1}/{batchTotal} — {batchCurrentPath.split(/[\\/]/).pop()}
                                                </div>
                                            )}
                                        </div>
                                        {isRootSyncing && <LucideIcon name="loader-2" className="w-3 h-3 text-amber-500 animate-spin" />}
                                    </div>
                                    <input
                                        className={`w-full bg-black/40 border rounded-xl px-3 py-1.5 text-[10px] font-mono text-slate-400 focus:outline-none transition-all font-bold ${isQueueMode ? 'border-emerald-500/40 focus:border-emerald-500/60' : 'border-slate-700/50 focus:border-amber-500/30'}`}
                                        placeholder={isQueueMode ? 'C:/batch_list.txt' : 'E:/Media/Organize...'}
                                        value={organizedPath}
                                        onChange={(e) => setOrganizedPath(e.target.value)}
                                        onBlur={() => { if (!isQueueMode) updateBackendRoot(organizedPath); }}
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-2">
                                    <button
                                        onClick={() => isQueueMode ? startBatchQueue() : runOrganizer(false)}
                                        disabled={isRunning || !organizedPath}
                                        className={`py-2 rounded-xl font-black text-[9px] uppercase tracking-wider transition-all flex items-center justify-center gap-2 ${isRunning ? 'bg-slate-800 text-slate-600' : isQueueMode ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-500/10 active:scale-[0.98]' : 'bg-amber-600 hover:bg-amber-500 text-white shadow-lg shadow-amber-500/10 active:scale-[0.98]'}`}
                                    >
                                        <LucideIcon name={isRunning && batchIndex >= 0 ? "loader-2" : isQueueMode ? "list-plus" : isRunning ? "loader-2" : "play"} className={`w-3 h-3 ${isRunning ? 'animate-spin' : ''}`} />
                                        {isRunning && batchIndex >= 0 ? `Queue ${batchIndex + 1}/${batchTotal}` : isQueueMode ? 'Load Queue...' : isRunning ? 'Running...' : 'Simulate'}
                                    </button>

                                    <button
                                        onClick={() => runOrganizer(false, { force_rescan: true })}
                                        disabled={isRunning || isCleaning || !organizedPath}
                                        className={`py-2 rounded-xl font-bold text-[9px] uppercase tracking-wider transition-all flex items-center justify-center gap-2 border bg-amber-500/10 border-amber-500/20 text-amber-500 hover:bg-amber-500/20 active:scale-[0.98] ${isRunning || isCleaning ? 'opacity-40' : ''}`}
                                    >
                                        <LucideIcon name="refresh-cw" className={`w-3 h-3 ${isRunning ? 'animate-spin' : ''}`} />
                                        Force Scan
                                    </button>

                                    <button
                                        onClick={() => {
                                            if (isQueueMode) {
                                                if (confirm(`GROUP COMMIT: This will run REAL file operations on ALL folders in the queue. Continue?`)) {
                                                    startBatchQueue(false);
                                                }
                                            } else if (logFilename && data.length > 0) {
                                                setShowCommitConfirm(true);
                                            } else {
                                                runOrganizer(true);
                                            }
                                        }}
                                        disabled={isRunning || isCleaning || !organizedPath}
                                        className={`py-2 rounded-xl font-bold text-[9px] uppercase tracking-wider transition-all flex items-center justify-center gap-2 ${isRunning ? 'bg-slate-800/50 text-slate-700' : isQueueMode ? 'bg-red-600 hover:bg-red-500 text-white border border-red-400/20 active:scale-[0.98]' : logFilename && data.length > 0 ? 'bg-emerald-600 hover:bg-emerald-500 text-white border border-emerald-400/20 active:scale-[0.98]' : 'bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-400/20 active:scale-[0.98]'}`}
                                    >
                                        <LucideIcon name={isQueueMode ? "rocket" : logFilename && data.length > 0 ? "check-circle" : "zap"} className={`w-3 h-3 ${isRunning ? 'opacity-20' : ''}`} />
                                        {isQueueMode ? 'Group Commit' : logFilename && data.length > 0 ? 'Execute Log' : 'Commit'}
                                    </button>

                                    <div className="grid grid-cols-2 gap-1.5 col-span-2">
                                        <button
                                            onClick={cleanupEmptyDirs}
                                            disabled={isRunning || isCleaning || !organizedPath}
                                            className={`py-2 rounded-xl font-bold text-[9px] uppercase tracking-wider transition-all flex items-center justify-center gap-1.5 border bg-slate-900 shadow-inner hover:bg-slate-800 active:scale-[0.98] ${isRunning || isCleaning ? 'opacity-40 border-slate-800 text-slate-600' : 'border-slate-700 text-slate-400 hover:border-slate-500 hover:text-slate-300'}`}
                                        >
                                            <LucideIcon name={isCleaning ? "loader-2" : "folder-x"} className={`w-3 h-3 ${isCleaning ? 'animate-spin text-amber-500' : ''}`} />
                                            {isCleaning ? "Cleaning..." : "Cleanup"}
                                        </button>
                                        <button
                                            onClick={purgeDuplicates}
                                            disabled={isRunning || isCleaning || !organizedPath}
                                            className={`py-2 rounded-xl font-bold text-[9px] uppercase tracking-wider transition-all flex items-center justify-center gap-1.5 border bg-slate-900 shadow-inner hover:bg-slate-800 active:scale-[0.98] ${isRunning || isCleaning ? 'opacity-40 border-slate-800 text-slate-600' : 'border-red-900/50 text-red-400/80 hover:border-red-500/50 hover:text-red-300'}`}
                                        >
                                            <LucideIcon name={isCleaning ? "loader-2" : "trash-2"} className={`w-3 h-3 ${isCleaning ? 'animate-spin text-amber-500' : ''}`} />
                                            Purge Dupes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className={`flex-1 overflow-y-auto p-6 scrollbar-thin ${isTuningCollapsed ? 'hidden' : ''}`}>
                            {tuningTab === 'params' ? (
                                <div className="space-y-8 h-full">
                                    {/* Parameters */}
                                    <section>
                                        <div className="flex items-center justify-between text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">
                                            <span>AI Parameters</span>
                                            <LucideIcon name="brain-circuit" className="w-3 h-3 opacity-50" />
                                        </div>

                                        {!showDiagPathPrompt ? (
                                            <button
                                                onClick={() => { setShowDiagPathPrompt(true); setDiagPath(organizedPath || ""); }}
                                                disabled={isDiagnosing}
                                                className="w-full mb-6 py-2.5 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 border border-indigo-500/20 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2"
                                            >
                                                <LucideIcon name={isDiagnosing ? "loader-2" : "microscope"} className={`w-3.5 h-3.5 ${isDiagnosing ? 'animate-spin' : ''}`} />
                                                {isDiagnosing ? "Analyzing..." : "Analyze Group Spread"}
                                            </button>
                                        ) : (
                                            <div className="mb-6 bg-indigo-500/5 p-3 rounded-xl border border-indigo-500/20 space-y-2">
                                                <div className="text-[8px] font-bold text-indigo-400 uppercase tracking-widest">Diagnostic Folder Path</div>
                                                <input
                                                    className="w-full bg-black/30 border border-slate-700 rounded-lg px-2 py-1.5 text-[10px] font-mono text-slate-300 focus:outline-none focus:border-indigo-500/50"
                                                    placeholder="C:/Manual/Group_A"
                                                    value={diagPath}
                                                    onChange={(e) => setDiagPath(e.target.value)}
                                                    autoFocus
                                                    onKeyDown={(e) => { if (e.key === 'Enter') runDiagnostics(); if (e.key === 'Escape') setShowDiagPathPrompt(false); }}
                                                />
                                                <div className="flex gap-2">
                                                    <button
                                                        onClick={runDiagnostics}
                                                        className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-1.5 rounded-lg text-[9px] uppercase tracking-wider transition-all"
                                                    >
                                                        Start Scan
                                                    </button>
                                                    <button
                                                        onClick={() => setShowDiagPathPrompt(false)}
                                                        className="px-2 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-lg text-[9px] transition-colors"
                                                    >
                                                        Cancel
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                        {(() => {
                                            const groupOrder = ['core', 'clustering', 'weights', 'name_grouping', 'other'];

                                        onClick={() => setShowCommitConfirm(false)}
                                        className="px-6 py-4 bg-slate-800 hover:bg-slate-700 text-slate-400 font-black text-xs uppercase tracking-widest rounded-2xl transition-all"
                                    >
                                        Cancel
                                    </button>
                                </div>

                                <button
                                    onClick={() => setShowCommitConfirm(false)}
                                    className="absolute top-6 right-6 text-white/20 hover:text-white transition-colors"
                                >
                                    <LucideIcon name="x" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
