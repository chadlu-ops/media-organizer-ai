<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Organizer Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .amber-glow {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Pipeline Tree Styling */
        .pipeline-connector {
            position: absolute;
            left: 19px;
            top: 40px;
            bottom: -20px;
            width: 2px;
            background: linear-gradient(to bottom, #475569 0%, rgba(71, 85, 105, 0.1) 100%);
            z-index: 0;
        }

        .pipeline-node:last-child .pipeline-connector {
            display: none;
        }

        .pipeline-dot {
            position: relative;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        const LucideIcon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    // Update the inner <i> tag
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    // Only process this specific root
                    lucide.createIcons({
                        root: iconRef.current
                    });
                }
            }, [name, className]);
            // inline-flex ensures the span shrinks to the icon size
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const MediaCard = ({ item, getImageUrl, onImageClick, virtualPath }) => {
            const [hasError, setHasError] = useState(false);
            const [retryCount, setRetryCount] = useState(0);
            const imageUrl = getImageUrl(item);
            const isVideo = item.Media_Type === "video" || (item.New_Path && item.New_Path.toLowerCase().includes("video/"));
            const maxRetries = 3;

            const openExplorer = (e) => {
                e.stopPropagation();
                window.open(`explorer.html?anchor=${item.Cluster_ID}`, '_blank');
            };

            const handleError = () => {
                if (retryCount < maxRetries) {
                    setTimeout(() => {
                        setRetryCount(prev => prev + 1);
                        setHasError(false);
                    }, 1000 * (retryCount + 1)); // Exponential backoff-ish
                } else {
                    setHasError(true);
                }
            };

            return (
                <div className="group flex flex-col gap-4">
                    <div className="aspect-[4/5] bg-slate-900 rounded-3xl overflow-hidden border border-white/5 shadow-2xl relative group-hover:border-amber-500/30 transition-all duration-500">
                        {item.Media_Type === "image" && !isVideo ? (
                            <>
                                {!hasError ? (
                                    <img
                                        key={`${imageUrl}-${retryCount}`}
                                        src={retryCount > 0 ? `${imageUrl}?r=${retryCount}` : imageUrl}
                                        className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 cursor-pointer"
                                        loading="lazy"
                                        onError={handleError}
                                        onClick={(e) => { e.stopPropagation(); onImageClick && onImageClick(item); }}
                                    />
                                ) : (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center p-6 text-center bg-slate-900">
                                        <LucideIcon name="alert-octagon" className="w-8 h-8 text-slate-700 mb-2" />
                                        <span className="text-[9px] font-bold text-slate-600 leading-tight">MEDIA_LINK_ERROR</span>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center gap-3 bg-slate-900">
                                <div className="w-16 h-16 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500 shadow-inner">
                                    <LucideIcon name="video" className="w-8 h-8" />
                                </div>
                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-600">Video Media</span>
                            </div>
                        )}

                        {/* Overlay Stats */}
                        <div className="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                            <div className="flex justify-between items-center text-[9px] font-bold uppercase text-white/60">
                                <span className="shrink-0">{item.Match_Source ? 'Matched To' : 'CRC32 Check'}</span>
                                <span className="text-amber-500 font-mono truncate ml-2 text-right flex-1" title={item.Match_Source || item.Hash || 'NONE'}>
                                    {item.Match_Source || (item.Hash ? item.Hash.substring(0, 8) : 'NONE')}
                                </span>
                            </div>
                            <button
                                onClick={openExplorer}
                                className="mt-2 w-full py-2 bg-amber-500 text-black rounded-xl text-[8px] font-black uppercase tracking-widest hover:bg-white transition-colors flex items-center justify-center gap-1"
                            >
                                <LucideIcon name="cloud" className="w-3 h-3" />
                                Explore Cloud
                            </button>
                        </div>
                    </div>
                    <div className="px-2">
                        <h4 className="text-[11px] font-black text-slate-400 truncate mb-0.5">{item.New_Filename || item.Filename || "unnamed_source"}</h4>
                        <div className="flex items-center gap-1.5 mb-1.5 opacity-60">
                            <LucideIcon name="folder-output" className="w-2.5 h-2.5 text-amber-500" />
                            <span className="text-[9px] font-mono text-amber-500 truncate" title={`Destination: ${virtualPath}`}>{virtualPath}</span>
                        </div>
                        <p className="text-[9px] font-bold text-slate-600 leading-tight line-clamp-2 italic">{item.Reason || "No diagnostic info available"}</p>
                    </div>
                </div>
            );
        };

        const PipelineNode = ({ phase, title, icon, children, isActive = true, isDeactivated = false }) => {
            return (
                <div className={`pipeline-node relative pb-10 ${!isActive ? 'opacity-40 grayscale pointer-events-none' : ''} ${isDeactivated ? 'opacity-25 grayscale' : ''}`}>
                    <div className="pipeline-connector"></div>
                    <div className="flex gap-4 relative">
                        <div className={`pipeline-dot w-10 h-10 rounded-xl flex items-center justify-center shrink-0 shadow-lg transition-all ${isActive && !isDeactivated ? 'bg-amber-500 text-white shadow-amber-500/20' : 'bg-slate-800 text-slate-500'}`}>
                            <LucideIcon name={icon} className="w-5 h-5" />
                        </div>
                        <div className="flex-1 pt-1">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="text-[10px] font-black text-amber-500/50 uppercase tracking-[0.2em]">{phase}</span>
                                <h3 className="text-sm font-bold text-white tracking-tight">{title}</h3>
                                {isDeactivated && <span className="text-[8px] font-black bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded uppercase">Deactivated</span>}
                            </div>
                            <div className="space-y-6">
                                {children}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DedupeRow = ({ original, duplicates, getImageUrl, onImageClick }) => {
            return (
                <div className="group bg-slate-900/30 rounded-3xl border border-white/5 p-6 hover:bg-slate-900/50 hover:border-amber-500/20 transition-all duration-500 mb-4 overflow-hidden shadow-2xl backdrop-blur-md">
                    <div className="flex gap-8">
                        {/* Master Source (The "Kept" image) */}
                        <div className="flex-shrink-0 w-80 space-y-3">
                            <div className="flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                    <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">MASTER SOURCE</span>
                                </div>
                                <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter italic">KEPT ORIGINAL</span>
                            </div>
                            
                            <div className="relative group/master cursor-pointer overflow-hidden rounded-2xl shadow-2xl border-2 border-emerald-500/10 hover:border-emerald-500/40 transition-all"
                                 onClick={() => original && onImageClick(original)}>
                                {original ? (
                                    <img 
                                        src={getImageUrl(original)} 
                                        className="w-full aspect-[4/3] object-cover transition-transform duration-700 group-hover/master:scale-110" 
                                    />
                                ) : (
                                    <div className="w-full aspect-[4/3] bg-slate-950 flex flex-col items-center justify-center border border-dashed border-white/10">
                                        <LucideIcon name="image-off" className="w-8 h-8 text-slate-800 mb-2" />
                                        <div className="text-[10px] font-black text-slate-700 uppercase tracking-widest">Original Reference</div>
                                        <div className="text-[8px] text-slate-800 italic mt-1 text-center px-4">(Moved in previous session or separate run)</div>
                                    </div>
                                )}
                                <div className="absolute top-3 left-3 bg-emerald-500 text-black px-3 py-1 rounded-full text-[9px] font-black shadow-xl">KEEP</div>
                            </div>
                            <div className="px-2">
                                <div className="text-[10px] font-bold text-white truncate mb-1">
                                    {original ? (original.New_Filename || original.Filename) : "MATCH SOURCE"}
                                </div>
                                <div className="text-[9px] text-slate-500 truncate font-mono uppercase tracking-tighter">
                                    {original ? (original.Cluster_ID || "Original") : "Cross-referenced Match"}
                                </div>
                            </div>
                        </div>

                        <div className="w-[1px] bg-gradient-to-b from-white/10 via-white/5 to-transparent self-stretch"></div>

                        {/* Duplicates (Horizontal Scroll) */}
                        <div className="flex-1 min-w-0 flex flex-col space-y-3">
                            <div className="flex items-center justify-between px-2">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]"></div>
                                    <span className="text-[10px] font-black text-rose-500 uppercase tracking-widest">REDUNDANT COPIES</span>
                                </div>
                                <span className="text-[9px] font-bold text-slate-500 tracking-widest uppercase">{duplicates.length} MATCHES</span>
                            </div>

                            <div className="flex-1 flex gap-4 overflow-x-auto pb-4 scrollbar-thin scrollbar-thumb-white/5 hover:scrollbar-thumb-amber-500/20 snap-x">
                                {duplicates.map((item, idx) => (
                                    <div 
                                        key={idx} 
                                        className="snap-start flex-shrink-0 w-64 group/card relative pt-2"
                                        onClick={() => onImageClick(item)}
                                    >
                                        <div className="relative cursor-pointer overflow-hidden rounded-xl border border-white/5 group-hover/card:border-rose-500/30 transition-all shadow-xl bg-slate-950">
                                            <img 
                                                src={getImageUrl(item)} 
                                                className="w-full aspect-[4/3] object-cover transition-transform duration-700 group-hover/card:scale-105 opacity-80 group-hover/card:opacity-100" 
                                            />
                                            <div className="absolute top-2 left-2 bg-rose-500 text-white px-2 py-0.5 rounded-lg text-[8px] font-black shadow-lg">DUP</div>
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity flex items-end p-3">
                                                <div className="text-[8px] font-black text-rose-400 uppercase tracking-widest">REDUNDANT MATCH</div>
                                            </div>
                                        </div>
                                        <div className="mt-2 px-1">
                                            <div className="text-[9px] font-bold text-slate-400 truncate mb-0.5">
                                                {item.New_Filename || item.Filename}
                                            </div>
                                            <div className="text-[8px] text-slate-600 truncate uppercase tracking-tighter">
                                                SCORE: {item.Match_Confidence || "Exact"}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [data, setData] = useState([]);
            const [organizedPath, setOrganizedPath] = useState(localStorage.getItem("organizedRoot") || "");
            const [backendRoot, setBackendRoot] = useState("");
            const [isRunning, setIsRunning] = useState(false);
            const [isRootSyncing, setIsRootSyncing] = useState(false);
            const [isVirtualMode, setIsVirtualMode] = useState(false);
            const [selectedCluster, setSelectedCluster] = useState(null);
            const [duplicateViewMode, setDuplicateViewMode] = useState('rows'); // 'grid' or 'rows'
            const [gridSize, setGridSize] = useState(6);
            const [lightboxItem, setLightboxItem] = useState(null);
            const [serverUrl, setServerUrl] = useState("http://localhost:8000");
            const [serverStatus, setServerStatus] = useState("unknown");
            const [settings, setSettings] = useState(null);
            const [progressLog, setProgressLog] = useState([]);
            const [showPathPrompt, setShowPathPrompt] = useState(false);
            const [showDiagPathPrompt, setShowDiagPathPrompt] = useState(false);
            const [diagPath, setDiagPath] = useState("");
            const [diagResult, setDiagResult] = useState(null);
            const [isDiagnosing, setIsDiagnosing] = useState(false);
            const [isConsoleExpanded, setIsConsoleExpanded] = useState(false);
            const [isTuningCollapsed, setIsTuningCollapsed] = useState(false);
            const [isInventoryCollapsed, setIsInventoryCollapsed] = useState(false);
            const [isFetchingLog, setIsFetchingLog] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [tuningTab, setTuningTab] = useState('params'); // 'params' | 'pipeline'
            const [isCleaning, setIsCleaning] = useState(false);
            const [logFilename, setLogFilename] = useState("");
            const [showCommitConfirm, setShowCommitConfirm] = useState(false);
            const [batchQueue, setBatchQueue] = useState([]);
            const [batchIndex, setBatchIndex] = useState(-1);
            const [batchTotal, setBatchTotal] = useState(0);
            const [batchCurrentPath, setBatchCurrentPath] = useState("");
            const [schemaError, setSchemaError] = useState(null);

            // Detect if the source folder input contains a .txt file path
            const isQueueMode = organizedPath.trim().toLowerCase().endsWith('.txt');

            const groups = useMemo(() => {
                const g = {};
                data.forEach(item => {
                    const c = item.Cluster_ID || "unsorted";
                    if (!g[c]) g[c] = [];
                    g[c].push(item);
                });
                return g;
            }, [data]);

            // Memoize grouped duplicates for VisiPics-style view
            const groupedDuplicates = useMemo(() => {
                if (selectedCluster !== 'duplicate') return [];
                
                const clusterItems = groups[selectedCluster] || [];
                const groupsMap = {};

                clusterItems.forEach(item => {
                    // Try to find the "Kept" source
                    let sourceKey = item.Match_Source;
                    
                    // Fallback for older logs: extract hash from Reason string "Duplicate: Exact MD5 match (hash)"
                    if (!sourceKey && item.Reason) {
                        const match = item.Reason.match(/\((.*?)\)/);
                        if (match) sourceKey = `Hash: ${match[1]}`;
                    }
                    
                    if (!sourceKey) sourceKey = "Unknown Source";
                    
                    if (!groupsMap[sourceKey]) groupsMap[sourceKey] = [];
                    groupsMap[sourceKey].push(item);
                });

                return Object.entries(groupsMap).map(([sourceKey, items]) => {
                    // Attempt to find the actual original item in the full dataset
                    const original = data.find(d => 
                        (d.New_Filename === sourceKey) || 
                        (d.Filename === sourceKey) ||
                        (d.Reason && d.Reason.includes(sourceKey.replace("Hash: ", "")))
                    );
                    
                    return {
                        sourceKey,
                        original,
                        duplicates: items
                    };
                });
            }, [selectedCluster, groups, data]);

            // Lightbox navigation helpers
            const lightboxNav = useCallback((direction) => {
                if (!lightboxItem || !selectedCluster || !groups[selectedCluster]) return;
                const items = groups[selectedCluster];
                const currentIdx = items.findIndex(item =>
                    (item.Original_Path || item.Old_Path || item.Source_Path) ===
                    (lightboxItem.Original_Path || lightboxItem.Old_Path || lightboxItem.Source_Path)
                );
                if (currentIdx === -1) return;
                const nextIdx = direction === 'next'
                    ? (currentIdx + 1) % items.length
                    : (currentIdx - 1 + items.length) % items.length;
                setLightboxItem(items[nextIdx]);
            }, [lightboxItem, selectedCluster, groups]);

            // Keyboard: Escape closes, arrows navigate
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape') setLightboxItem(null);
                    if (lightboxItem && e.key === 'ArrowRight') lightboxNav('next');
                    if (lightboxItem && e.key === 'ArrowLeft') lightboxNav('prev');
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [lightboxItem, lightboxNav]);

            // Handle Menu Click Away
            useEffect(() => {
                const handleClick = (e) => {
                    if (isMenuOpen && !e.target.closest('.app-menu-container')) {
                        setIsMenuOpen(false);
                    }
                };
                window.addEventListener('mousedown', handleClick);
                return () => window.removeEventListener('mousedown', handleClick);
            }, [isMenuOpen]);

            const browseLogs = async () => {
                try {
                    await fetch(`${serverUrl}/api/browse_logs`, { method: 'POST' });
                    setIsMenuOpen(false);
                } catch (e) {
                    console.error("Failed to open logs folder", e);
                }
            };

            const triggerFileLoad = () => {
                document.getElementById('hidden-log-picker').click();
                setIsMenuOpen(false);
            };

            const [paramSchema, setParamSchema] = useState([]);
            const [aiParams, setAiParams] = useState({});
            const [enabledPlugins, setEnabledPlugins] = useState({});
            const [modeSettings, setModeSettings] = useState({
                individual: {},
                folder: {
                    min_cluster_size: 2,
                    epsilon: 0.02
                }
            });
            const [prevMode, setPrevMode] = useState('individual');

            // Heartbeat check for server health
            useEffect(() => {
                const checkServer = async () => {
                    try {
                        const res = await fetch(`${serverUrl}/api/status`);
                        if (res.ok) {
                            const data = await res.json();
                            setServerStatus("connected");
                            setBackendRoot(data.root || "");
                        } else {
                            setServerStatus("error");
                        }
                    } catch (e) {
                        setServerStatus("error");
                    }
                };
                checkServer();
                const interval = setInterval(checkServer, 10000);
                return () => clearInterval(interval);
            }, [serverUrl]);

            const updateBackendRoot = async (path) => {
                if (!path) return;
                setIsRootSyncing(true);
                try {
                    const res = await fetch(`${serverUrl}/api/set_root`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: path.replace(/\\/g, "/") })
                    });
                    const result = await res.json();
                    if (res.ok) {
                        localStorage.setItem("organizedRoot", path);
                        setBackendRoot(result.new_root || path);
                        setOrganizedPath(result.new_root || path);
                    } else {
                        alert("Error setting root: " + (result.error || "Unknown error"));
                    }
                } catch (e) {
                    console.error("Failed to update root", e);
                } finally {
                    setIsRootSyncing(false);
                }
            };

            // Sync root path with backend on load if found in localStorage
            useEffect(() => {
                if (organizedPath) updateBackendRoot(organizedPath);
            }, []);

            useEffect(() => {
                fetch(`${serverUrl}/api/schema?t=${Date.now()}`)
                    .then(r => r.json())
                    .then(schema => {
                        if (!Array.isArray(schema)) {
                            console.error('Invalid schema format:', schema);
                            setSchemaError(schema.error || "Parameter engine failed to initialize.");
                            return;
                        }
                        setSchemaError(null);
                        setParamSchema(schema);
                        const defaults = {};
                        const pluginDefaults = {};
                        schema.forEach(p => {
                            defaults[p.key] = p.default;
                            if (p.is_plugin) {
                                pluginDefaults[p.key] = p.type === 'bool' ? p.default : (p.default > 0);
                            }
                        });

                        if (pluginDefaults['enable_folder_flattening']) {
                            pluginDefaults['enable_ai_clustering'] = false;
                            pluginDefaults['group_name_matches'] = false;
                            pluginDefaults['group_name_prefix'] = false;
                        }

                        setAiParams(prev => ({ ...defaults, ...prev }));
                        setEnabledPlugins(prev => ({ ...pluginDefaults, ...prev }));
                    })
                    .catch(err => {
                        console.warn('Schema fetch failed:', err);
                        setSchemaError("Could not connect to Parameter Engine helper.");
                    });
            }, [serverUrl]);

            // Handle AI Mode Switching (Persistence)
            useEffect(() => {
                const currentMode = aiParams.ai_clustering_mode || 'individual';
                if (currentMode === prevMode) return;
                if (!Array.isArray(paramSchema)) return;

                const clusteringKeys = paramSchema
                    .filter(p => p.group === 'clustering' || p.group === 'weights')
                    .map(p => p.key);

                const backup = {};
                clusteringKeys.forEach(k => {
                    if (aiParams[k] !== undefined) backup[k] = aiParams[k];
                });

                setModeSettings(prev => ({
                    ...prev,
                    [prevMode]: backup
                }));

                const nextSettings = modeSettings[currentMode];
                if (Object.keys(nextSettings).length > 0) {
                    setAiParams(prev => ({
                        ...prev,
                        ...nextSettings,
                        ai_clustering_mode: currentMode
                    }));
                }

                setPrevMode(currentMode);
            }, [aiParams.ai_clustering_mode, prevMode, paramSchema]);

            // React-safe Lucide initialization
            // No global createIcons needed as icons are handled by LucideIcon component

            // Toggle a plugin on/off with mutual exclusivity logic
            const togglePlugin = (key) => {
                setEnabledPlugins(prev => {
                    const next = { ...prev };
                    const isNowEnabled = !next[key];
                    next[key] = isNowEnabled;

                    // If Flattening enabled: Disable AI and Name/Prefix grouping
                    if (key === 'enable_folder_flattening' && isNowEnabled) {
                        next['enable_ai_clustering'] = false;
                        next['group_name_matches'] = false;
                        next['group_name_prefix'] = false;
                    }
                    // If AI or Name grouping enabled: Disable Flattening
                    if ((key === 'enable_ai_clustering' || key === 'group_name_matches' || key === 'group_name_prefix') && isNowEnabled) {
                        next['enable_folder_flattening'] = false;
                    }
                    return next;
                });
            };

            // Calculate a "Virtual Path" for UI preview based on current parameters
            const getVirtualPath = useCallback((row) => {
                if (!row) return "";
                
                const clusterId = row.Cluster_ID || "noise";
                const mediaType = (row.Media_Type || "").toLowerCase();
                const isDeduplicationActive = enabledPlugins['enable_deduplication'] !== false;
                const isAiActive = enabledPlugins['enable_ai_clustering'] !== false;
                const isVideoSortingActive = enabledPlugins['enable_video_sorting'] !== false;

                // Detect states from current log entries
                const rawNewPath = (row.New_Path || row.Destination_Path || "").replace("[DRY RUN] ", "").replace(/\\/g, "/");
                const isPreviouslyDuplicate = rawNewPath.toLowerCase().includes("/duplicates/");
                const isPreviouslyReview = rawNewPath.toLowerCase().includes("/review_needed/") || row.Review_Needed === "True";
                const orientation = rawNewPath.toLowerCase().includes("/videos/vertical/") ? "vertical" : "horizontal";

                // Base root determination
                let base = aiParams.use_organized_subfolder ? "Organized" : "";
                
                // Priority paths
                if (isPreviouslyDuplicate && isDeduplicationActive) return base ? `${base}/duplicates` : "duplicates";
                if (isPreviouslyReview) return base ? `${base}/review_needed` : "review_needed";

                // Flat Structure
                if (aiParams.deployment_structure === 'flat') {
                    return base || ".";
                }

                // Structured Layout
                let segments = [];
                if (base) segments.push(base);

                if (mediaType === 'video') {
                    if (isVideoSortingActive) {
                        segments.push("videos");
                        segments.push(orientation);
                    } else {
                        segments.push("videos");
                    }
                } else if (isAiActive) {
                    if (clusterId === "noise" || clusterId === "unknown") {
                        segments.push("unsorted");
                    } else {
                        segments.push("groups");
                        segments.push(clusterId);
                    }
                } else {
                    segments.push("unsorted");
                }

                return segments.join("/");
            }, [aiParams.deployment_structure, aiParams.use_organized_subfolder, enabledPlugins]);

            // Generic control renderer based on schema entry
            const renderParamControl = (p) => {
                const val = aiParams[p.key];
                const update = (v) => setAiParams(prev => ({ ...prev, [p.key]: v }));

                if (p.type === 'bool' && !p.is_plugin) {
                    const isForcedOrg = p.key === 'use_organized_subfolder' && aiParams.action === 'copy';
                    const displayVal = isForcedOrg ? true : !!val;
                    
                    return (
                        <label key={p.key} className={`flex items-center gap-2 relative group/ctrl ${isForcedOrg ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'}`}>
                            <input type="checkbox" checked={displayVal} 
                                disabled={isForcedOrg}
                                onChange={(e) => update(e.target.checked)}
                                className="w-3.5 h-3.5 accent-amber-500 rounded cursor-pointer disabled:opacity-50" />
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                {p.label}
                                {isForcedOrg && <span className="ml-2 text-[8px] text-amber-500/50 italic">(Enforced for Safety)</span>}
                            </span>
                            <i data-lucide="info" className="w-2.5 h-2.5 text-slate-500 opacity-40 group-hover/ctrl:opacity-100 group-hover/ctrl:text-amber-400 transition-all cursor-help ml-2"></i>
                            <div className="absolute left-0 bottom-full mb-2 w-64 p-3 bg-slate-800/95 backdrop-blur-xl text-slate-200 text-[10px] rounded-xl shadow-2xl border border-white/10 opacity-0 invisible group-hover/ctrl:opacity-100 group-hover/ctrl:visible transition-all z-[100] pointer-events-none font-medium leading-relaxed">
                                <div className="text-amber-400 font-bold mb-1 uppercase tracking-tighter text-[9px]">Parameter Logic</div>
                                {isForcedOrg ? "This option is forced enabled during 'Copy' mode to prevent creating thousands of redundant file copies in your source root. Switch to 'Move' for in-place organization." : p.tooltip}
                            </div>
                        </label>
                    );
                }
                if (p.type === 'choice') {
                    return (
                        <div key={p.key} className="space-y-2">
                            <div className="flex justify-between text-[11px] font-medium items-center group relative mb-1">
                                <div className="flex items-center gap-1.5 cursor-help">
                                    <span>{p.label}</span>
                                    <i data-lucide="info" className="w-2.5 h-2.5 text-slate-500 opacity-40 group-hover:opacity-100 group-hover:text-amber-400 transition-all"></i>
                                    <div className="absolute left-0 bottom-full mb-2 w-64 p-3 bg-slate-800/95 backdrop-blur-xl text-slate-200 text-[10px] rounded-xl shadow-2xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] pointer-events-none font-medium leading-relaxed">
                                        <div className="text-amber-400 font-bold mb-1 uppercase tracking-tighter text-[9px]">Heuristic Policy</div>
                                        {p.tooltip}
                                    </div>
                                </div>
                                <span className="text-amber-400 uppercase text-[9px]">{val}</span>
                            </div>
                            <div className="flex bg-slate-800 p-1 rounded-lg">
                                {p.choices.map(c => (
                                    <button key={c} onClick={() => update(c)}
                                        className={`flex-1 py-1 text-[10px] font-bold rounded ${val === c ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500 hover:text-slate-400'}`}
                                    >{c.toUpperCase()}</button>
                                ))}
                            </div>
                        </div>
                    );
                }
                // int or float — range slider
                const step = p.step || (p.type === 'int' ? 1 : 0.05);
                const min = p.min ?? 0;
                const max = p.max ?? 1;
                const parse = p.type === 'int' ? parseInt : parseFloat;
                const display = p.type === 'float' ? (val ?? 0).toFixed(String(step).split('.')[1]?.length || 2) : val;
                return (
                    <div key={p.key} className="space-y-3">
                        <div className="flex justify-between text-xs font-bold items-center group relative">
                            <div className="flex items-center gap-1.5 cursor-help">
                                <span>{p.label}</span>
                                <i data-lucide="info" className="w-2.5 h-2.5 text-slate-500 opacity-40 group-hover:opacity-100 group-hover:text-amber-400 transition-all"></i>
                                <div className="absolute left-0 bottom-full mb-2 w-72 p-3 bg-slate-800/95 backdrop-blur-xl text-slate-200 text-[10px] rounded-xl shadow-2xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] pointer-events-none font-medium leading-relaxed">
                                    <div className="text-amber-400 font-bold mb-1 uppercase tracking-tighter text-[9px]">Variable Influence</div>
                                    {p.tooltip}
                                </div>
                            </div>
                            <span className="text-amber-400 font-mono text-xs">{display}</span>
                        </div>
                        <input type="range" min={min} max={max} step={step} value={val ?? p.default}
                            onChange={(e) => update(parse(e.target.value))}
                            className="w-full accent-amber-500 h-2.5 bg-slate-900/50 border border-white/5 rounded-lg appearance-none cursor-pointer shadow-inner hover:bg-slate-900 transition-colors" />
                    </div>
                );
            };

            // Render a plugin card with toggle
            const renderPluginCard = (p) => {
                const isAiClusteringOff = p.group === 'weights' && enabledPlugins['enable_ai_clustering'] === false;
                const isEnabled = (enabledPlugins[p.key] !== false) && !isAiClusteringOff;
                const val = aiParams[p.key];
                const update = (v) => setAiParams(prev => ({ ...prev, [p.key]: v }));
                const icon = p.plugin_icon || 'puzzle';

                return (
                    <div key={p.key} className={`bg-slate-900/40 rounded-xl border transition-all duration-300 ${isEnabled ? 'border-amber-500/20 shadow-[0_0_15px_rgba(245,158,11,0.03)]' : 'border-white/5 opacity-50'} ${isAiClusteringOff ? 'grayscale-[0.5]' : ''}`}>
                        <div className="flex items-center justify-between px-3 py-2.5 cursor-pointer" onClick={() => !isAiClusteringOff && togglePlugin(p.key)}>
                            <div className="flex items-center gap-2">
                                <div className={`w-6 h-6 rounded-lg flex items-center justify-center transition-colors ${isEnabled ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-800 text-slate-600'}`}>
                                    <i data-lucide={icon} className="w-3 h-3"></i>
                                </div>
                                <div className="max-w-[140px]">
                                    <div className="flex items-center gap-1.5 group/info relative">
                                        <div className="text-[10px] font-bold text-slate-300 uppercase tracking-wider truncate">{p.label}</div>
                                        <i data-lucide="info" className="w-2.5 h-2.5 text-slate-500 opacity-40 group-hover/info:opacity-100 group-hover/info:text-amber-400 transition-all cursor-help"></i>
                                        <div className="absolute left-0 bottom-full mb-2 w-64 p-3 bg-slate-800/95 backdrop-blur-xl text-slate-200 text-[10px] rounded-xl shadow-2xl border border-white/10 opacity-0 invisible group-hover/info:opacity-100 group-hover/info:visible transition-all z-[100] pointer-events-none font-medium leading-relaxed">
                                            <div className="text-amber-400 font-bold mb-1 uppercase tracking-tighter text-[9px]">Plugin Analysis</div>
                                            {p.tooltip}
                                        </div>
                                    </div>
                                    <div className="text-[8px] text-slate-600 truncate">{isAiClusteringOff ? "Requires AI Engine to be active" : "Configurable plugin active"}</div>
                                </div>
                            </div>
                            <button
                                disabled={isAiClusteringOff}
                                className={`w-8 h-4 rounded-full transition-colors relative flex-shrink-0 ${isEnabled ? 'bg-amber-500' : 'bg-slate-700'} ${isAiClusteringOff ? 'opacity-30' : ''}`}
                            >
                                <div className={`absolute top-0.5 w-3 h-3 rounded-full bg-white transition-all ${isEnabled ? 'left-4' : 'left-0.5'}`}></div>
                            </button>
                        </div>
                        {isEnabled && (
                            <div className="px-3 pb-3 pt-0">
                                {p.type === 'bool' ? (
                                    <div className="text-[9px] text-amber-400/80 font-bold uppercase tracking-widest text-center py-1">Active</div>
                                ) : (() => {
                                    const step = p.step || 0.05;
                                    const min = p.min ?? 0;
                                    const max = p.max ?? 1;
                                    const parse = p.type === 'int' ? parseInt : parseFloat;
                                    const display = p.type === 'float' ? (val ?? 0).toFixed(String(step).split('.')[1]?.length || 2) : val;
                                    return (
                                        <div className="space-y-2 mt-1">
                                            <div className="flex justify-between text-[10px] font-bold">
                                                <span className="text-slate-600 font-mono">{min}</span>
                                                <span className="text-amber-400 font-mono">{display}</span>
                                                <span className="text-slate-600 font-mono">{max}</span>
                                            </div>
                                            <input type="range" min={min} max={max} step={step} value={val ?? p.default}
                                                onChange={(e) => update(parse(e.target.value))}
                                                className="w-full accent-amber-500 h-2 bg-slate-900/50 border border-white/5 rounded-lg appearance-none cursor-pointer shadow-inner hover:bg-slate-900 transition-colors" />
                                        </div>
                                    );
                                })()}
                            </div>
                        )}
                    </div>
                );
            };

            // Group schema entries by their group field
            const schemaGroups = useMemo(() => {
                const groups = {};
                if (Array.isArray(paramSchema)) {
                    paramSchema.forEach(p => {
                        if (p.key === 'dry_run') return; // Handled by Simulate/Execute buttons
                        const g = p.group || 'other';
                        if (!groups[g]) groups[g] = [];
                        groups[g].push(p);
                    });
                }
                return groups;
            }, [paramSchema]);


            const loadLatestLog = async () => {
                if (isFetchingLog) return;
                setIsFetchingLog(true);
                setIsMenuOpen(false);
                try {
                    const res = await fetch(`${serverUrl}/api/latest_log?t=${Date.now()}`);
                    if (!res.ok) {
                        const err = await res.json();
                        alert("Could not find latest log: " + (err.error || "unknown error"));
                        setIsFetchingLog(false);
                        return;
                    }
                    const logInfo = await res.json();
                    setLogFilename(logInfo.filename);

                    // Fetch the actual CSV content
                    const csvRes = await fetch(`${serverUrl}/logs/${encodeURIComponent(logInfo.filename)}`);
                    if (!csvRes.ok) {
                        alert(`Failed to download log: ${logInfo.filename}`);
                        return;
                    }
                    const csvText = await csvRes.text();

                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            if (results.data && results.data.length > 0) {
                                setData(results.data);
                                processLogMetadata(results.data);

                                // Auto-select the first cluster if none selected
                                const firstId = results.data[0].Cluster_ID || "unknown";
                                if (!selectedCluster) setSelectedCluster(firstId);
                            } else {
                                alert("Loaded log is empty or invalid.");
                            }
                        }
                    });
                } catch (e) {
                    console.error("Failed to load latest log", e);
                    alert("Connection error while loading log.");
                } finally {
                    setIsFetchingLog(false);
                }
            };

            const processLogMetadata = (csvData) => {
                if (csvData.length > 0) {
                    // Virtual Mode Detection
                    const isDry = csvData.some(row => {
                        const newPath = row.New_Path || row.Destination_Path || "";
                        const reason = row.Reason || "";
                        const sets = row.Settings || "{}";
                        let isDryInSettings = false;
                        try { isDryInSettings = JSON.parse(sets).dry_run === true; } catch (e) { }
                        return (newPath && newPath.includes("[DRY RUN]")) ||
                            (reason.toLowerCase().includes("dry run")) ||
                            isDryInSettings;
                    });
                    setIsVirtualMode(isDry);

                    // Extract Settings
                    if (csvData[0].Settings) {
                        try {
                            const parsed = JSON.parse(csvData[0].Settings);
                            if (Object.keys(parsed).length > 0) {
                                setSettings(parsed);
                                // Sync tuning params dynamically from the log
                                setAiParams(prev => {
                                    const next = { ...prev };
                                    Object.entries(parsed).forEach(([key, val]) => {
                                        if (key in prev || key === 'epsilon' || key === 'method') {
                                            // Handle legacy key mapping if necessary
                                            const actualKey = (key === 'cluster_epsilon') ? 'epsilon' :
                                                (key === 'cluster_selection_method') ? 'method' : key;
                                            next[actualKey] = val;
                                        }
                                    });
                                    return next;
                                });
                            }
                        } catch (e) { }
                    }
                }
            };

            const runOrganizer = async (isRealRun = false, overrides = {}) => {
                if (isRunning || !organizedPath) return;

                setIsRunning(true);
                setIsConsoleExpanded(true);
                setProgressLog([]);
                
                const finalParams = { ...aiParams, dry_run: !isRealRun, ...overrides };
                
                // Sync the path to the backend first
                await updateBackendRoot(organizedPath);

                // Override disabled plugins: send 0 for weights, false for bools
                if (Array.isArray(paramSchema)) {
                    paramSchema.forEach(p => {
                        if (p.is_plugin) {
                            const isEnabled = enabledPlugins[p.key] !== false;
                            if (p.type === 'bool') {
                                finalParams[p.key] = isEnabled;
                            } else if (!isEnabled) {
                                finalParams[p.key] = 0;
                            }
                        }
                    });
                }

                try {
                    const res = await fetch(`${serverUrl}/api/run`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(finalParams)
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert("Run failed: " + err.error);
                        setIsRunning(false);
                        return;
                    }

                    // Start polling for completion & progress
                    const poll = setInterval(async () => {
                        try {
                            const progRes = await fetch(`${serverUrl}/api/progress`);
                            if (progRes.ok) {
                                const progData = await progRes.json();
                                setProgressLog(progData.log || []);
                                if (!progData.running) {
                                    clearInterval(poll);
                                    setIsRunning(false);
                                    await loadLatestLog();
                                }
                            } else {
                                // Fallback
                                const statusRes = await fetch(`${serverUrl}/api/status_job`);
                                const statusData = await statusRes.json();
                                if (!statusData.running) {
                                    clearInterval(poll);
                                    setIsRunning(false);
                                    await loadLatestLog();
                                }
                            }
                        } catch (e) {
                            clearInterval(poll);
                            setIsRunning(false);
                        }
                    }, 1000); // Polling every 1000ms for stability

                } catch (e) {
                    alert("Failed to communicate with helper.");
                    setIsRunning(false);
                }
            };

            const commitFromLog = async () => {
                if (isRunning || !logFilename) return;
                
                setShowCommitConfirm(false);
                setIsRunning(true);
                setIsConsoleExpanded(true);
                setProgressLog([
                    `[COMMIT] Executing log: ${logFilename}`,
                    `[COMMIT] Validating file integrity before operations...`
                ]);

                try {
                    const res = await fetch(`${serverUrl}/api/commit_log`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: logFilename })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert("Commit failed: " + err.error);
                        setIsRunning(false);
                        return;
                    }

                    // Poll for completion & progress (reuse existing pattern)
                    const poll = setInterval(async () => {
                        try {
                            const progressRes = await fetch(`${serverUrl}/api/progress`);
                            const progressData = await progressRes.json();
                            
                            if (progressData.log && progressData.log.length > 0) {
                                setProgressLog(progressData.log);
                            }
                            
                            if (!progressData.running) {
                                clearInterval(poll);
                                setIsRunning(false);
                                setProgressLog(prev => [...prev, "[COMMIT] Done. Refresh log to see results."]);
                                
                                // Auto-refresh the latest log
                                try {
                                    const logRes = await fetch(`${serverUrl}/api/latest_log`);
                                    if (logRes.ok) {
                                        const logInfo = await logRes.json();
                                        const csvRes = await fetch(`${serverUrl}/logs/${logInfo.filename}`);
                                        const csvText = await csvRes.text();
                                        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                                        setData(parsed.data.filter(r => r.Original_Path));
                                        setLogFilename(logInfo.filename);
                                    }
                                } catch(e) {}
                            }
                        } catch (e) {}
                    }, 1000);
                } catch (e) {
                    alert("Failed to communicate with helper.");
                    setIsRunning(false);
                }
            };

            // ---- Batch Queue Logic ----
            const startBatchQueue = async (dryRun = true) => {
                if (isRunning || !isQueueMode) return;

                const txtPath = organizedPath.trim();
                setIsConsoleExpanded(true);
                const modeLabel = dryRun ? 'SIMULATE' : 'COMMIT';
                setProgressLog([`[QUEUE] Loading batch file: ${txtPath}`, `[QUEUE] Mode: ${modeLabel}`]);

                try {
                    // Fetch the .txt file contents via the absolute path server
                    const absPath = txtPath.replace(/\\/g, "/");
                    const res = await fetch(`${serverUrl}/_abs/${encodeURIComponent(absPath)}`);
                    if (!res.ok) {
                        alert(`Could not read batch file: ${txtPath}`);
                        return;
                    }
                    const rawText = await res.text();

                    // Parse: one path per line, strip comments (#) and empty lines
                    const paths = rawText
                        .split(/\r?\n/)
                        .map(line => line.trim())
                        .filter(line => line && !line.startsWith('#'));

                    if (paths.length === 0) {
                        alert("Batch file is empty or contains no valid paths.");
                        return;
                    }

                    setProgressLog(prev => [...prev,
                        `[QUEUE] Found ${paths.length} folder(s) to process:`,
                        ...paths.map((p, i) => `  ${i + 1}. ${p}`)
                    ]);

                    setBatchQueue(paths);
                    setBatchTotal(paths.length);
                    setBatchIndex(0);

                    // Start processing the first item
                    await runBatchItem(paths, 0, dryRun);
                } catch (e) {
                    console.error("Batch load error:", e);
                    alert("Failed to load batch file: " + e.message);
                }
            };

            const runBatchItem = async (queue, index, dryRun = true) => {
                if (index >= queue.length) {
                    // All done
                    setBatchIndex(-1);
                    setBatchCurrentPath("");
                    setIsRunning(false);
                    const modeLabel = dryRun ? 'SIMULATED' : 'COMMITTED';
                    setProgressLog(prev => [...prev,
                        "",
                        "=" .repeat(60),
                        `[QUEUE] BATCH ${modeLabel} - ${queue.length} folder(s) processed.`,
                        "=" .repeat(60)
                    ]);
                    return;
                }

                const folderPath = queue[index];
                setBatchIndex(index);
                setBatchCurrentPath(folderPath);
                setIsRunning(true);

                setProgressLog(prev => [...prev,
                    "",
                    "-".repeat(60),
                    `[QUEUE] (${index + 1}/${queue.length}) ${dryRun ? 'Simulating' : 'Committing'}: ${folderPath}`,
                    "-".repeat(60)
                ]);

                // 1. Sync the backend root to this folder
                try {
                    const rootRes = await fetch(`${serverUrl}/api/set_root`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: folderPath })
                    });
                    if (!rootRes.ok) {
                        setProgressLog(prev => [...prev, `[QUEUE] ERROR: Could not set root to "${folderPath}". Skipping.`]);
                        await runBatchItem(queue, index + 1, dryRun);
                        return;
                    }
                } catch (e) {
                    setProgressLog(prev => [...prev, `[QUEUE] ERROR: Connection failed for "${folderPath}". Skipping.`]);
                    await runBatchItem(queue, index + 1, dryRun);
                    return;
                }

                // 2. Build params (same as runOrganizer)
                const finalParams = { ...aiParams, dry_run: dryRun };
                if (Array.isArray(paramSchema)) {
                    paramSchema.forEach(p => {
                        if (p.is_plugin) {
                            const isEnabled = enabledPlugins[p.key] !== false;
                            if (p.type === 'bool') {
                                finalParams[p.key] = isEnabled;
                            } else if (!isEnabled) {
                                finalParams[p.key] = 0;
                            }
                        }
                    });
                }

                // 3. Fire the run
                try {
                    const runRes = await fetch(`${serverUrl}/api/run`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(finalParams)
                    });
                    if (!runRes.ok) {
                        setProgressLog(prev => [...prev, `[QUEUE] ERROR: Run failed for "${folderPath}". Skipping.`]);
                        await runBatchItem(queue, index + 1, dryRun);
                        return;
                    }
                } catch (e) {
                    setProgressLog(prev => [...prev, `[QUEUE] ERROR: Run request failed for "${folderPath}". Skipping.`]);
                    await runBatchItem(queue, index + 1, dryRun);
                    return;
                }

                // 4. Poll for completion, then advance to next
                const poll = setInterval(async () => {
                    try {
                        const progRes = await fetch(`${serverUrl}/api/progress`);
                        if (progRes.ok) {
                            const progData = await progRes.json();
                            // Merge queue-level context with live process output
                            if (progData.log && progData.log.length > 0) {
                                setProgressLog(prev => {
                                    // Keep queue header lines, replace process lines
                                    const queueLines = prev.filter(l => l.startsWith('[QUEUE]') || l.startsWith('  ') || l.startsWith('-') || l.startsWith('='));
                                    return [...queueLines, ...progData.log];
                                });
                            }
                            if (!progData.running) {
                                clearInterval(poll);
                                setProgressLog(prev => [...prev, `[QUEUE] (${index + 1}/${queue.length}) Finished: ${folderPath}`]);
                                // Advance to next
                                await runBatchItem(queue, index + 1, dryRun);
                            }
                        }
                    } catch (e) {
                        clearInterval(poll);
                        setProgressLog(prev => [...prev, `[QUEUE] ERROR: Lost connection during "${folderPath}". Stopping.`]);
                        setBatchIndex(-1);
                        setIsRunning(false);
                    }
                }, 1500);
            };

            const cleanupEmptyDirs = async () => {
                if (isCleaning || isRunning) return;
                
                setIsCleaning(true);
                setIsConsoleExpanded(true);

                // If in queue mode, iterate through all folders in the .txt file
                if (isQueueMode) {
                    setProgressLog(prev => [...prev.slice(-50), `[CLEANUP] Batch mode: loading queue file...`]);
                    try {
                        const absPath = organizedPath.trim().replace(/\\/g, "/");
                        const res = await fetch(`${serverUrl}/_abs/${encodeURIComponent(absPath)}`);
                        if (!res.ok) { alert("Could not read batch file."); setIsCleaning(false); return; }
                        const rawText = await res.text();
                        const paths = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('#'));

                        let totalDeleted = 0;
                        for (let i = 0; i < paths.length; i++) {
                            setProgressLog(prev => [...prev, `[CLEANUP] (${i + 1}/${paths.length}) Scanning: ${paths[i]}`]);
                            try {
                                const cleanRes = await fetch(`${serverUrl}/api/cleanup_for_root`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ root: paths[i] })
                                });
                                const result = await cleanRes.json();
                                if (cleanRes.ok) {
                                    totalDeleted += result.count;
                                    if (result.count > 0) {
                                        setProgressLog(prev => [...prev,
                                            `  Removed ${result.count} empty dir(s).`,
                                            ...result.deleted.map(d => `    - ${d}`)
                                        ]);
                                    } else {
                                        setProgressLog(prev => [...prev, `  No empty directories.`]);
                                    }
                                } else {
                                    setProgressLog(prev => [...prev, `  ERROR: ${result.error}`]);
                                }
                            } catch (e) {
                                setProgressLog(prev => [...prev, `  ERROR: Connection failed for ${paths[i]}`]);
                            }
                        }
                        setProgressLog(prev => [...prev, `[CLEANUP] Batch complete: ${totalDeleted} total empty directories removed across ${paths.length} folder(s).`]);
                    } catch (e) {
                        setProgressLog(prev => [...prev, `[CLEANUP ERROR] ${e.message}`]);
                    } finally {
                        setIsCleaning(false);
                    }
                    return;
                }

                // Standard single-folder cleanup
                setProgressLog(prev => [...prev.slice(-50), `[CLEANUP] Starting recursive empty folder scan...`]);
                
                try {
                    const res = await fetch(`${serverUrl}/api/cleanup_empty_dirs`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    
                    const result = await res.json();
                    if (res.ok) {
                        if (result.count > 0) {
                            setProgressLog(prev => [
                                ...prev, 
                                `[CLEANUP] Success: Removed ${result.count} empty directories.`,
                                ...result.deleted.map(d => `  - Deleted: ${d}`)
                            ]);
                        } else {
                            setProgressLog(prev => [...prev, `[CLEANUP] Scan complete. No empty directories found.`]);
                        }
                    } else {
                        setProgressLog(prev => [...prev, `[CLEANUP ERROR] ${result.error}`]);
                    }
                } catch (e) {
                    setProgressLog(prev => [...prev, `[CLEANUP ERROR] Failed to connect to server.`]);
                } finally {
                    setIsCleaning(false);
                }
            };

            const purgeDuplicates = async () => {
                if (isCleaning || isRunning) return;

                setIsCleaning(true);
                setIsConsoleExpanded(true);

                // If in queue mode, purge dupes across all roots
                if (isQueueMode) {
                    if (!confirm("PURGE DUPLICATES: This will permanently DELETE all files in the duplicates/ folder for EVERY folder in the queue. Continue?")) {
                        setIsCleaning(false);
                        return;
                    }
                    setProgressLog(prev => [...prev.slice(-50), `[PURGE] Batch mode: loading queue file...`]);
                    try {
                        const absPath = organizedPath.trim().replace(/\\/g, "/");
                        const res = await fetch(`${serverUrl}/_abs/${encodeURIComponent(absPath)}`);
                        if (!res.ok) { alert("Could not read batch file."); setIsCleaning(false); return; }
                        const rawText = await res.text();
                        const paths = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l && !l.startsWith('#'));

                        let totalFiles = 0;
                        let totalMB = 0;
                        for (let i = 0; i < paths.length; i++) {
                            setProgressLog(prev => [...prev, `[PURGE] (${i + 1}/${paths.length}) Purging dupes in: ${paths[i]}`]);
                            try {
                                const purgeRes = await fetch(`${serverUrl}/api/purge_duplicates`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ root: paths[i] })
                                });
                                const result = await purgeRes.json();
                                if (purgeRes.ok) {
                                    totalFiles += result.files_deleted;
                                    totalMB += result.size_freed_mb;
                                    setProgressLog(prev => [...prev,
                                        `  Deleted ${result.files_deleted} file(s), freed ${result.size_freed_mb} MB`
                                    ]);
                                } else {
                                    setProgressLog(prev => [...prev, `  ERROR: ${result.error}`]);
                                }
                            } catch (e) {
                                setProgressLog(prev => [...prev, `  ERROR: Connection failed for ${paths[i]}`]);
                            }
                        }
                        setProgressLog(prev => [...prev, `[PURGE] Batch complete: ${totalFiles} duplicate files deleted, ${totalMB.toFixed(2)} MB freed.`]);
                    } catch (e) {
                        setProgressLog(prev => [...prev, `[PURGE ERROR] ${e.message}`]);
                    } finally {
                        setIsCleaning(false);
                    }
                    return;
                }

                // Single-folder purge
                if (!confirm("PURGE DUPLICATES: This will permanently DELETE all files in the duplicates/ folder. This cannot be undone. Continue?")) {
                    setIsCleaning(false);
                    return;
                }
                setProgressLog(prev => [...prev.slice(-50), `[PURGE] Scanning for duplicates folder...`]);
                try {
                    const res = await fetch(`${serverUrl}/api/purge_duplicates`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });
                    const result = await res.json();
                    if (res.ok) {
                        if (result.files_deleted > 0) {
                            setProgressLog(prev => [...prev,
                                `[PURGE] Deleted ${result.files_deleted} duplicate file(s) from ${result.dupes_path}`,
                                `[PURGE] Freed ${result.size_freed_mb} MB of disk space.`,
                                `[PURGE] Removed ${result.dirs_deleted} empty subfolder(s).`
                            ]);
                        } else {
                            setProgressLog(prev => [...prev, `[PURGE] ${result.message || 'No duplicate files found.'}`]);
                        }
                    } else {
                        setProgressLog(prev => [...prev, `[PURGE ERROR] ${result.error}`]);
                    }
                } catch (e) {
                    setProgressLog(prev => [...prev, `[PURGE ERROR] Failed to connect to server.`]);
                } finally {
                    setIsCleaning(false);
                }
            };

            const runDiagnostics = async () => {
                const targetPath = diagPath || organizedPath;
                if (isDiagnosing || !targetPath) return;
                setIsDiagnosing(true);
                setDiagResult(null);
                setShowDiagPathPrompt(false);
                try {
                    // Respect plugin toggles for diagnostic weights
                    const tw = (enabledPlugins['enable_ai_clustering'] !== false && enabledPlugins['temporal_weight'] !== false) ? aiParams.temporal_weight : 0;
                    const fw = (enabledPlugins['enable_ai_clustering'] !== false && enabledPlugins['filename_weight'] !== false) ? aiParams.filename_weight : 0;
                    const cw = (enabledPlugins['enable_ai_clustering'] !== false && enabledPlugins['color_weight'] !== false) ? aiParams.color_weight : 0;
                    const hw = (enabledPlugins['enable_ai_clustering'] !== false && enabledPlugins['near_duplicate_weight'] !== false) ? (aiParams.hash_weight || aiParams.near_duplicate_weight || 0) : 0;
                    const vw = (enabledPlugins['enable_ai_clustering'] !== false) ? (aiParams.visual_weight ?? 1.0) : 0;

                    const res = await fetch(`${serverUrl}/api/diagnose`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            folder: targetPath,
                            temporal_weight: tw,
                            filename_weight: fw,
                            color_weight: cw,
                            hash_weight: hw,
                            visual_weight: vw
                        })
                    });
                    const result = await res.json();
                    if (res.ok) {
                        setDiagResult(result);
                    } else {
                        alert("Diagnostic failed: " + result.error);
                    }
                } catch (e) {
                    alert("Failed to reach diagnostic service.");
                } finally {
                    setIsDiagnosing(false);
                }
            };

            const applyDiagSettings = () => {
                if (!diagResult) return;
                setAiParams(prev => ({
                    ...prev,
                    epsilon: diagResult.recommendations.suggested_epsilon,
                    min_cluster_size: diagResult.recommendations.suggested_min_samples
                }));
                setDiagResult(null);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLogFilename(file.name);
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        if (results.data && results.data.length > 0) {
                            setData(results.data);
                            processLogMetadata(results.data);
                            const firstId = results.data[0].Cluster_ID || "unknown";
                            setSelectedCluster(firstId);
                        }
                    }
                });
            };


            const getImageUrl = (item) => {
                if (!item) return "";
                const origPath = item.Original_Path || item.Old_Path || item.Source_Path;
                const newPath = item.New_Path || item.Destination_Path;

                if (isVirtualMode && origPath) {
                    const absPath = origPath.replace(/\\/g, "/");
                    return `${serverUrl}/_abs/${encodeURIComponent(absPath)}`;
                }

                let rawPath = (newPath || "").replace("[DRY RUN] ", "").replace(/\\/g, "/");
                const marker = "/organized/";
                const markerIdx = rawPath.toLowerCase().lastIndexOf(marker);

                let rel = "";
                if (markerIdx !== -1) {
                    rel = rawPath.substring(markerIdx + marker.length);
                } else if (organizedPath) {
                    const root = organizedPath.replace(/\\/g, "/").toLowerCase();
                    const idx = rawPath.toLowerCase().lastIndexOf(root);
                    if (idx !== -1) rel = rawPath.substring(idx + root.length);
                    else rel = rawPath.split("/").slice(-2).join("/");
                } else {
                    rel = rawPath.split("/").slice(-2).join("/");
                }

                if (rel.startsWith("/")) rel = rel.substring(1);
                return `${serverUrl}/${rel.split('/').map(encodeURIComponent).join('/')}`;
            };


            const clusterKeys = Object.keys(groups).sort((a, b) => {
                if (a === "noise") return 1;
                if (b === "noise") return -1;
                return a.localeCompare(b);
            });

            const stats = {
                totalFiles: data.length,
                clusters: clusterKeys.filter(k => k.startsWith("group_")).length,
                noise: groups["noise"]?.length || 0,
                duplicates: groups["duplicate"]?.length || 0
            };

            return (
                <div className="flex h-screen overflow-hidden text-slate-300">
                    {/* Left Sidebar: Controls \u0026 Tuning */}
                    <aside className={`${isTuningCollapsed ? 'w-14' : 'w-[420px]'} bg-[#0c1222] border-r border-slate-800 flex flex-col overflow-hidden shadow-2xl z-20 transition-all duration-300 relative`}>
                        {/* Collapse Toggle */}
                        <button
                            onClick={() => setIsTuningCollapsed(!isTuningCollapsed)}
                            className="absolute top-3 right-0 translate-x-1/2 z-30 w-5 h-10 bg-slate-800 hover:bg-amber-500/20 border border-slate-700 hover:border-amber-500/40 rounded-full flex items-center justify-center transition-all group"
                            title={isTuningCollapsed ? 'Expand Tuning Lab' : 'Collapse Tuning Lab'}
                        >
                            <LucideIcon name={isTuningCollapsed ? 'chevron-right' : 'chevron-left'} className="w-3 h-3 text-slate-500 group-hover:text-amber-400 transition-colors" />
                        </button>
