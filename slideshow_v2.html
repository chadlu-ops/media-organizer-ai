<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow V2 — Stateful Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
        }
        .glass {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .grid-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000;
        }
        .slot {
            position: absolute;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .media-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .media-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1.5s ease-in-out;
        }
        .media-enter { opacity: 0; transform: scale(1.05); }
        .media-enter-active { opacity: 1; transform: scale(1); }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #f59e0b;
            transition: width linear;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        .slot-loading {
            background: #1a1b26; /* Tokyo Night Theme */
            position: relative;
            overflow: hidden;
        }
        .slot-loading::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px;
        }

        .mutation-highlight {
            animation: mutate-pulse 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        @keyframes mutate-pulse {
            0% { box-shadow: 0 0 0 0px rgba(245, 158, 11, 0), inset 0 0 0 0px rgba(245, 158, 11, 0); transform: scale(1); }
            30% { box-shadow: 0 0 40px rgba(245, 158, 11, 0.4), inset 0 0 20px rgba(245, 158, 11, 0.2); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0px rgba(245, 158, 11, 0), inset 0 0 0 0px rgba(245, 158, 11, 0); transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const LucideIcon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const MediaItem = ({ media, isPlaying, isMuted, isAudioSource, duration, imageFit, onComplete }) => {
            const videoRef = useRef(null);
            const [loaded, setLoaded] = useState(false);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                if (videoRef.current) {
                    videoRef.current.muted = isMuted || !isAudioSource;
                }
            }, [isMuted, isAudioSource]);

            const jitteredDuration = useMemo(() => {
                return duration * (0.8 + Math.random() * 0.4);
            }, [duration, media.path]);

            useEffect(() => {
                if (media.type === 'image' && isPlaying) {
                    const timer = setTimeout(onComplete, jitteredDuration);
                    return () => clearTimeout(timer);
                }
            }, [media, isPlaying, jitteredDuration, onComplete]);

            useEffect(() => {
                if (media.type === 'video' && videoRef.current) {
                    if (isPlaying) videoRef.current.play().catch(() => {});
                    else videoRef.current.pause();
                }
            }, [isPlaying, media.type]);

            const handleVideoTimeUpdate = () => {
                if (videoRef.current) {
                    const p = (videoRef.current.currentTime / videoRef.current.duration) * 100;
                    setProgress(p);
                }
            };

            const mediaUrl = `/_abs/${encodeURIComponent(media.path)}`;

            return (
                <div className="media-container bg-black">
                    {media.type === 'video' ? (
                        <video 
                            ref={videoRef}
                            src={mediaUrl}
                            autoPlay
                            muted={isMuted || !isAudioSource}
                            playsInline
                            className={`media-content ${loaded ? 'opacity-100' : 'opacity-0'}`}
                            style={{ objectFit: imageFit }}
                            onLoadedData={() => setLoaded(true)}
                            onTimeUpdate={handleVideoTimeUpdate}
                            onEnded={onComplete}
                        />
                    ) : (
                        <img 
                            key={media.path}
                            src={mediaUrl}
                            className={`media-content ${loaded ? 'opacity-100' : 'opacity-0'}`}
                            style={{ objectFit: imageFit }}
                            onLoad={() => setLoaded(true)}
                        />
                    )}
                    {media.type === 'video' && (
                        <div className="progress-bar" style={{ width: `${progress}%` }} />
                    )}
                </div>
            );
        };

        const GridSlot = ({ slot, mediaPool, isScanning, layoutType, landscapePool, portraitPool, isPlaying, isMuted, isAudioSource, rotationSpeed, imageFit, onRebuild, autoReflow }) => {
            const [item, setItem] = useState(null);
            const [spawnTime, setSpawnTime] = useState(0);
            const [failCount, setFailCount] = useState(0);
            const [stagnation, setStagnation] = useState(0);
            const [isMutating, setIsMutating] = useState(false);
            const rotateTimerRef = useRef(null);
            
            // Unique pace for this slot (0.7x to 1.4x of global speed)
            const paceMultiplier = useMemo(() => 0.7 + Math.random() * 0.7, []);
            const hasStartedRotation = useRef(false);

            const lpRef = useRef(landscapePool);
            const ppRef = useRef(portraitPool);
            useEffect(() => { lpRef.current = landscapePool; ppRef.current = portraitPool; }, [landscapePool, portraitPool]);

            const rotate = useCallback(() => {
                if (!isPlaying) return;
                
                // Diversity Check (Priority Fetching)
                const currentRatio = landscapePool.length / (portraitPool.length + 0.001);
                const needsPortrait = currentRatio > 1.5; // Bias towards balance
                const needsLandscape = currentRatio < 0.6;
                
                let targetIsPortrait = slot.ratio < 1;
                
                // If this is a mutation-capable layout, we can try to "force" a type 
                // but for now we follow the slot's physical shape
                const pool = targetIsPortrait ? ppRef.current : lpRef.current;
                
                if (pool && pool.length > 0) {
                    // Content-Aware Selection: 
                    // Pick 10 random candidates and choose the one that BEST fits this slot's ratio.
                    // This dramatically reduces letterboxing in "Native" mode.
                    let bestItem = pool[0];
                    let bestDiff = Infinity;
                    const sampleSize = Math.min(15, pool.length);
                    
                    for (let i = 0; i < sampleSize; i++) {
                        const candidate = pool[Math.floor(Math.random() * pool.length)];
                        const diff = Math.abs(candidate.ratio - slot.ratio);
                        if (diff < bestDiff) {
                            bestDiff = diff;
                            bestItem = candidate;
                        }
                    }

                    const newItem = bestItem;
                    
                    // Mutation Logic (Phase 2)
                    if (layoutType === 'mosaic' && newItem.orientation === (item?.orientation || '')) {
                        setStagnation(prev => prev + 1);
                    } else {
                        setStagnation(0);
                    }

                    setItem(newItem);
                    setSpawnTime(Date.now());
                    setFailCount(0);
                } else {
                    setFailCount(prev => prev + 1);
                    rotateTimerRef.current = setTimeout(rotate, 2000);
                }
            }, [isPlaying, slot.ratio, item, layoutType]);

            // If stagnation limit reached, trigger mutation pulse (only if autoReflow is on)
            useEffect(() => {
                if (autoReflow && layoutType === 'mosaic' && stagnation >= 15) {
                    setIsMutating(true);
                    setTimeout(() => {
                        setIsMutating(false);
                        onRebuild(); // Trigger a partial or full rebuild to break stagnation
                    }, 1000);
                    setStagnation(0);
                }
            }, [stagnation, layoutType, onRebuild, autoReflow]);

            // Share state with parent for audio selection
            useEffect(() => {
                if (item?.type === 'video') {
                    window.dispatchEvent(new CustomEvent('video-active', { 
                        detail: { id: slot.id, spawnTime, active: true } 
                    }));
                    return () => window.dispatchEvent(new CustomEvent('video-active', { 
                        detail: { id: slot.id, active: false } 
                    }));
                }
            }, [item, spawnTime, slot.id]);

            useEffect(() => {
                // Initial fill: Pick first item as soon as pool is available
                if (!item && (landscapePool.length > 0 || portraitPool.length > 0)) {
                    rotate();
                }
            }, [landscapePool.length, portraitPool.length, item, rotate]);

            const isReady = !isScanning || mediaPool.length >= 1000;

            useEffect(() => {
                if (mediaPool.length === 0 || hasStartedRotation.current) return;
                
                // Start rotation cycle if scanning is complete OR we have enough variety (1000 items)
                if (!isReady) return;

                hasStartedRotation.current = true;

                const delay = Math.random() * rotationSpeed * 1000 * paceMultiplier;
                rotateTimerRef.current = setTimeout(rotate, delay);
                return () => clearTimeout(rotateTimerRef.current);
            }, [isReady, mediaPool.length]); 

            const handleComplete = useCallback(() => {
                rotate();
            }, [rotate]);

            const overlap = imageFit === 'contain' ? 1.1 : 1.0;
            const w = slot.w * overlap;
            const h = slot.h * overlap;
            const x = slot.x - (w - slot.w) / 2;
            const y = slot.y - (h - slot.h) / 2;

            return (
                <div 
                    className={`absolute transition-all duration-1000 ease-in-out ${isMutating ? 'mutation-highlight' : ''}`} 
                    style={{ 
                        left: x, 
                        top: y, 
                        width: w, 
                        height: h, 
                        zIndex: isMutating ? 50 : (item ? 10 : 0) 
                    }}
                >
                    <div className={`w-full h-full overflow-hidden shadow-2xl transition-all duration-700 ${!item ? 'slot-loading' : ''}`}>
                        {item && (
                            <MediaItem 
                                media={item} 
                                isPlaying={isPlaying} 
                                isMuted={isMuted}
                                isAudioSource={isAudioSource}
                                duration={rotationSpeed * 1000 * paceMultiplier}
                                imageFit={imageFit}
                                onComplete={handleComplete} 
                            />
                        )}
                    </div>
                </div>
            );
        };



        const DirectoryPicker = ({ onSelect, onClose }) => {
            const [currentPath, setCurrentPath] = useState("");
            const [folders, setFolders] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            const loadFolders = async (path = "") => {
                setIsLoading(true);
                try {
                    const res = await fetch(`/api/fs/list?path=${encodeURIComponent(path)}`);
                    const data = await res.json();
                    if (data.folders) setFolders(data.folders);
                    setCurrentPath(data.path || "");
                } catch (e) { console.error(e); }
                setIsLoading(false);
            };

            useEffect(() => { loadFolders(""); }, []);

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
                    <div className="bg-[#1a1b26] border border-white/10 rounded-3xl w-full max-w-lg flex flex-col max-h-[70vh] shadow-2xl overflow-hidden">
                        <div className="p-6 border-b border-white/5 flex items-center justify-between bg-black/20">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-black uppercase tracking-widest text-amber-500">Remote Browser</span>
                                <span className="text-xs font-bold text-white truncate max-w-[300px]">{currentPath || "Computer"}</span>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-white/5 rounded-xl transition-all"><LucideIcon name="x" /></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-1">
                            {currentPath && (
                                <button 
                                    onClick={() => loadFolders(currentPath.split('/').slice(0, -1).join('/') || "")}
                                    className="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-2xl transition-all text-slate-400 group"
                                >
                                    <LucideIcon name="corner-left-up" className="w-4 h-4 group-hover:text-amber-500" />
                                    <span className="text-xs font-bold">Go Back</span>
                                </button>
                            )}
                            {folders.map(f => (
                                <div key={f} className="flex items-center gap-1 group">
                                    <button 
                                        onClick={() => loadFolders(f)}
                                        className="flex-1 flex items-center gap-3 p-3 hover:bg-white/5 rounded-2xl transition-all text-slate-300"
                                    >
                                        <LucideIcon name="folder" className="w-4 h-4 text-amber-500/50 group-hover:text-amber-500" />
                                        <span className="text-xs font-bold truncate">{f.split('/').pop() || f}</span>
                                    </button>
                                    <button 
                                        onClick={() => (onSelect(f), onClose())}
                                        className="p-3 text-emerald-500 hover:bg-emerald-500/10 rounded-2xl transition-all opacity-0 group-hover:opacity-100"
                                        title="Select this folder"
                                    >
                                        <LucideIcon name="check-circle-2" className="w-5 h-5" />
                                    </button>
                                </div>
                            ))}
                            {folders.length === 0 && !isLoading && (
                                <div className="p-12 text-center text-slate-600 italic text-sm">No folders found</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ControlStepper = ({ label, value, onIncrease, onDecrease, suffix = "" }) => (
            <div className="flex flex-col gap-1 px-3 sm:px-5 border-r border-white/10 last:border-r-0">
                <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-slate-500">{label}</span>
                <div className="flex items-center gap-2 sm:gap-3">
                    <button 
                        onClick={onDecrease}
                        className="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors border border-white/10 shrink-0"
                    >
                        <LucideIcon name="minus" className="w-3 h-3" />
                    </button>
                    <span className="text-xs sm:text-sm font-bold w-8 sm:w-12 text-center text-amber-500/90">{value}{suffix}</span>
                    <button 
                        onClick={onIncrease}
                        className="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors border border-white/10 shrink-0"
                    >
                        <LucideIcon name="plus" className="w-3 h-3" />
                    </button>
                </div>
            </div>
        );

        const SourceManager = ({ sources, onToggle, onRemove, onAdd, isOpen, onClose }) => {
            const [newPath, setNewPath] = useState("");
            const [isPickerOpen, setIsPickerOpen] = useState(false);
            if (!isOpen) return null;

            return (
                <div className="absolute bottom-24 left-0 glass rounded-3xl p-6 w-96 shadow-2xl border border-white/10 z-[100] animate-in fade-in slide-in-from-bottom-4 duration-300">
                    {isPickerOpen && <DirectoryPicker onSelect={onAdd} onClose={() => setIsPickerOpen(false)} />}
                    <div className="flex items-center justify-between mb-4">
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Library Sources</span>
                        <button onClick={onClose} className="text-slate-500 hover:text-white transition-colors">
                            <LucideIcon name="x" className="w-4 h-4" />
                        </button>
                    </div>
                    <div className="flex flex-col gap-2 max-h-64 overflow-y-auto custom-scrollbar pr-2 mb-4">
                        {sources.map((src, i) => (
                            <div key={i} className="flex items-center gap-3 bg-white/5 p-2 rounded-xl group hover:bg-white/10 transition-all border border-white/5">
                                <input type="checkbox" checked={src.enabled} onChange={() => onToggle(i)} className="w-4 h-4 rounded border-white/10 bg-black/40 accent-amber-500 cursor-pointer" />
                                <span className={`text-[11px] font-black flex-1 truncate transition-colors ${src.enabled ? 'text-white' : 'text-slate-700 italic'}`}>{src.path}</span>
                                <button onClick={() => onRemove(i)} className="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/20 hover:text-red-500 text-slate-500 rounded-lg transition-all">
                                    <LucideIcon name="trash-2" className="w-3.5 h-3.5" />
                                </button>
                            </div>
                        ))}
                    </div>
                    <div className="flex items-center gap-2 bg-black/20 p-1 rounded-2xl border border-white/5 focus-within:border-amber-500/50">
                        <input 
                            type="text" 
                            value={newPath} 
                            onChange={(e) => setNewPath(e.target.value)} 
                            onKeyDown={(e) => e.key === 'Enter' && (onAdd(newPath), setNewPath(""))}
                            placeholder="Manual path..." 
                            className="bg-transparent text-[10px] font-bold text-white focus:outline-none flex-1 px-3 py-2 placeholder:text-slate-700" 
                        />
                        <button onClick={() => (onAdd(newPath), setNewPath(""))} className="bg-emerald-500 hover:bg-emerald-400 text-black p-2 rounded-xl transition-all" title="Add manual path"><LucideIcon name="check" className="w-4 h-4" /></button>
                        <button onClick={() => setIsPickerOpen(true)} className="bg-amber-500 hover:bg-amber-400 text-black p-2 rounded-xl transition-all" title="Browse server files"><LucideIcon name="folder-plus" className="w-4 h-4" /></button>
                    </div>
                </div>
            );
        };

        function App() {
            const [mediaPool, setMediaPool] = useState([]);
            const [sources, setSources] = useState([]);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(true);
            const [activeVideos, setActiveVideos] = useState([]);
            const [layoutType, setLayoutType] = useState('grid'); // 'grid' (Justified) or 'mosaic' (BSP)
            const [density, setDensity] = useState(3);
            const [imageFit, setImageFit] = useState('cover');
            const [rotationSpeed, setRotationSpeed] = useState(10);
            const [maxDuration, setMaxDuration] = useState(30);
            const [mediaFilter, setMediaFilter] = useState(0); // 0: All, 1: Videos, 2: Images
            const [recursive, setRecursive] = useState(true);
            const [isLoading, setIsLoading] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [scanningPath, setScanningPath] = useState("");
            const [isSourceMenuOpen, setIsSourceMenuOpen] = useState(false);
            const [showControls, setShowControls] = useState(true);
            const [autoReflow, setAutoReflow] = useState(true);
            const [slots, setSlots] = useState([]);
            const mediaPoolRef = useRef([]);
            useEffect(() => { mediaPoolRef.current = mediaPool; }, [mediaPool]);
            
            const controlsTimerRef = useRef(null);

            const containerRef = useRef(null);

            const landscapePool = useMemo(() => mediaPool.filter(m => m.ratio >= 1), [mediaPool]);
            const portraitPool = useMemo(() => mediaPool.filter(m => m.ratio < 1), [mediaPool]);

            // Audio Management: Track the oldest video
            useEffect(() => {
                const handleVideoActive = (e) => {
                    setActiveVideos(prev => {
                        const { id, spawnTime, active } = e.detail;
                        if (!active) return prev.filter(v => v.id !== id);
                        if (prev.find(v => v.id === id)) return prev;
                        return [...prev, { id, spawnTime }].sort((a, b) => a.spawnTime - b.spawnTime);
                    });
                };
                window.addEventListener('video-active', handleVideoActive);
                return () => window.removeEventListener('video-active', handleVideoActive);
            }, []);

            const audioSourceId = activeVideos[0]?.id;

            // Layout Engine 1: Justified Row Grid (Phase 1)
            const generateJustifiedLayout = useCallback(() => {
                const pool = mediaPoolRef.current;
                if (!containerRef.current || pool.length === 0) return;
                
                const width = containerRef.current.offsetWidth;
                const height = containerRef.current.offsetHeight;
                const rows = [];
                
                const targetRowHeight = height / Math.max(1, density);
                const startIdx = Math.floor(Math.random() * pool.length);
                const sampleSize = 100;

                let currentRow = [];
                let currentRowWidth = 0;
                let accumulatedHeight = 0;

                for (let i = 0; i < sampleSize; i++) {
                    const item = pool[(startIdx + i) % pool.length];
                    if (!item) continue;
                    currentRow.push(item);
                    currentRowWidth += item.ratio * targetRowHeight;

                    if (currentRowWidth > width * 0.9) {
                        const scale = width / currentRowWidth;
                        const finalHeight = targetRowHeight * scale;
                        rows.push({ items: currentRow, height: finalHeight });
                        accumulatedHeight += finalHeight;
                        currentRow = [];
                        currentRowWidth = 0;
                        if (accumulatedHeight > height * 0.95) break;
                    }
                }

                if (currentRow.length > 0 && accumulatedHeight < height) {
                    const totalRatio = currentRow.reduce((acc, i) => acc + i.ratio, 0);
                    const finalHeight = width / totalRatio;
                    rows.push({ items: currentRow, height: finalHeight });
                    accumulatedHeight += finalHeight;
                }

                const globalScale = height / accumulatedHeight;
                const newSlots = [];
                let currentY = 0;

                for (const row of rows) {
                    const normalizedHeight = row.height * globalScale;
                    let currentX = 0;
                    const rowTotalRatio = row.items.reduce((acc, i) => acc + i.ratio, 0);
                    for (const item of row.items) {
                        const itemWidth = (item.ratio / rowTotalRatio) * width;
                        newSlots.push({
                            id: Math.random().toString(36).substr(2, 9),
                            x: currentX, y: currentY, w: itemWidth, h: normalizedHeight,
                            ratio: item.ratio, type: 'justified'
                        });
                        currentX += itemWidth;
                    }
                    currentY += normalizedHeight;
                }
                setSlots(newSlots);
            }, [density]);

            // Layout Engine 2: Dynamic BSP Mosaic (Phase 2)
            const generateMosaicLayout = useCallback(() => {
                if (!containerRef.current) return;
                const width = containerRef.current.offsetWidth;
                const height = containerRef.current.offsetHeight;
                
                const newSlots = [];
                const maxDepth = Math.floor(density * 1.5);

                const split = (x, y, w, h, depth) => {
                    const ratio = w / h;
                    
                    // CONTENT-AWARE SPLITTING: 
                    // If a box is "Extremely" wide or tall, we MUST split it further 
                    // to fit more images and reduce letterboxing, regardless of density.
                    const isExtreme = ratio > 2.2 || ratio < 0.45;
                    const splitProbability = isExtreme ? 0.9 : 0.6;
                    
                    const isLeaf = depth >= maxDepth || (depth > 2 && Math.random() > splitProbability);

                    if (isLeaf && !isExtreme) {
                        newSlots.push({
                            id: Math.random().toString(36).substr(2, 9),
                            x, y, w, h, ratio,
                            depth, parentId: null
                        });
                        return;
                    }

                    // Split along the longest axis
                    if (w > h) {
                        const splitPoint = w * (0.35 + Math.random() * 0.3);
                        split(x, y, splitPoint, h, depth + 1);
                        split(x + splitPoint, y, w - splitPoint, h, depth + 1);
                    } else {
                        const splitPoint = h * (0.35 + Math.random() * 0.3);
                        split(x, y, w, splitPoint, depth + 1);
                        split(x, y + splitPoint, w, h - splitPoint, depth + 1);
                    }
                };

                split(0, 0, width, height, 0);
                setSlots(newSlots);
            }, [density]);

            const generateLayout = useCallback(() => {
                if (layoutType === 'grid') generateJustifiedLayout();
                else generateMosaicLayout();
            }, [layoutType, generateJustifiedLayout, generateMosaicLayout]);

            useEffect(() => {
                generateLayout();
                const handleResize = () => generateLayout();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [generateLayout]);

            const loadMedia = async (currentSources = sources, isRefresh = false) => {
                const active = currentSources.filter(s => s.enabled).map(s => s.path);
                if (active.length === 0) return;
                
                setIsLoading(true);
                if (isRefresh) {
                    setMediaPool([]);
                    setSlots([]);
                }
                try {
                    // Step 1: Trigger background scan
                    await fetch('/api/images/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            folders: active, 
                            recursive, 
                            include_videos: mediaFilter !== 2, 
                            videos_only: mediaFilter === 1,
                            images_only: mediaFilter === 2,
                            max_video_duration: maxDuration,
                            fast_load: !isRefresh 
                        })
                    });

                    // Wait a moment for scanner to find initial batch
                    await new Promise(r => setTimeout(r, 500));

                    // Step 2: Fetch Seed (Fast first 100)
                    const seedRes = await fetch('/api/images/seed');
                    const seedData = await seedRes.json();
                    setMediaPool(seedData.items);
                    setIsScanning(seedData.status.running);

                    // Step 3: Progressive Load Background
                    let currentOffset = seedData.items.length;
                    
                    const fetchNextChunk = async () => {
                        try {
                            const res = await fetch(`/api/images/index?offset=${currentOffset}&limit=500`);
                            const data = await res.json();
                            if (data.items && data.items.length > 0) {
                                setMediaPool(prev => [...prev, ...data.items]);
                                currentOffset += data.items.length;
                                if (currentOffset < data.total || data.status.running) {
                                    setIsScanning(data.status.running);
                                    setTimeout(fetchNextChunk, 1000); // Background throttle
                                } else {
                                    setIsScanning(false);
                                }
                            } else if (data.status.running) {
                                setTimeout(fetchNextChunk, 1000);
                            }
                        } catch (err) { console.error("Index fetch error", err); }
                    };
                    
                    fetchNextChunk();
                } catch (e) { console.error("Load error", e); }
                finally { setIsLoading(false); }
            };

            useEffect(() => { 
                const init = async () => {
                    try {
                        const res = await fetch('/api/slideshow/sources');
                        const data = await res.json();
                        if (data.sources) {
                            setSources(data.sources);
                            if (data.sources.some(s => s.enabled)) loadMedia(data.sources);
                        }
                    } catch (e) {
                        const local = JSON.parse(localStorage.getItem("slideshow_sources") || "[]");
                        setSources(local);
                        if (local.some(s => s.enabled)) loadMedia(local);
                    }
                };
                init();
            }, []);

            const syncSources = async (next) => {
                setSources(next);
                localStorage.setItem("slideshow_sources", JSON.stringify(next));
                try {
                    await fetch('/api/slideshow/sources', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sources: next })
                    });
                } catch (e) { console.error(e); }
            };

            useEffect(() => { 
                // Only generate initial layout when mediaPool FIRST gets items
                if (mediaPool.length > 0 && slots.length === 0) {
                    generateLayout();
                }
            }, [mediaPool, generateLayout, slots.length]);

            const mediaFilterMounted = useRef(false);
            useEffect(() => {
                if (!mediaFilterMounted.current) { mediaFilterMounted.current = true; return; }
                if (sources.some(s => s.enabled)) loadMedia(sources, true);
            }, [mediaFilter]);

            useEffect(() => {
                const handleInteraction = () => {
                    setShowControls(true);
                    clearTimeout(controlsTimerRef.current);
                    controlsTimerRef.current = setTimeout(() => setShowControls(false), 3000);
                };
                window.addEventListener('mousemove', handleInteraction);
                window.addEventListener('keydown', handleInteraction);
                handleInteraction(); // Show initially
                return () => {
                    window.removeEventListener('mousemove', handleInteraction);
                    window.removeEventListener('keydown', handleInteraction);
                    clearTimeout(controlsTimerRef.current);
                };
            }, []);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.error(err));
                } else {
                    document.exitFullscreen();
                }
            };

            return (
                <div className="grid-container" ref={containerRef}>
                    {slots.map(slot => (
                        <GridSlot 
                            key={slot.id} 
                            slot={slot} 
                            mediaPool={mediaPool}
                            isScanning={isScanning}
                            layoutType={layoutType}
                            landscapePool={landscapePool} 
                            portraitPool={portraitPool}
                            isPlaying={isPlaying} 
                            isMuted={isMuted}
                            isAudioSource={slot.id === audioSourceId}
                            rotationSpeed={rotationSpeed}
                            imageFit={imageFit}
                            onRebuild={generateLayout}
                            autoReflow={autoReflow}
                        />
                    ))}

                    {/* Overlay Controls */}
                    <div className={`fixed bottom-4 sm:bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-700 ${showControls ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-12 scale-95 pointer-events-none'} glass rounded-[1.5rem] sm:rounded-[2rem] px-4 py-3 sm:px-8 sm:py-4 flex flex-wrap justify-center items-center gap-3 sm:gap-6 shadow-2xl border border-white/10 w-[95vw] lg:w-auto max-w-[95vw]`}>
                        {isScanning && (
                            <div className="absolute -top-10 sm:-top-12 left-1/2 -translate-x-1/2 bg-amber-500 text-black text-[9px] font-black px-3 py-1 rounded-full flex items-center gap-2 shadow-xl animate-bounce">
                                <LucideIcon name="database" className="w-3 h-3" />
                                INDEXING: {mediaPool.length} ITEMS
                            </div>
                        )}
                        <div className="flex flex-col gap-1 pr-3 sm:pr-6 border-r border-white/10 relative">
                            <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-slate-500">Sources</span>
                            <div className="flex items-center gap-2 sm:gap-3">
                                <button onClick={() => setIsSourceMenuOpen(!isSourceMenuOpen)} className="flex items-center gap-1 sm:gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-2xl bg-white/5 border border-white/5 text-white hover:bg-white/10 transition-all">
                                    <LucideIcon name="library" className="w-3 h-3 sm:w-4 sm:h-4" />
                                    <span className="text-[9px] sm:text-[10px] font-black uppercase">{sources.filter(s => s.enabled).length} Active</span>
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); loadMedia(sources, true); }} 
                                    className={`${isLoading ? 'animate-spin' : 'text-amber-500'} p-1.5 sm:p-2 hover:bg-white/5 rounded-xl transition-all`}
                                >
                                    <LucideIcon name="refresh-cw" className="w-3 h-3 sm:w-4 sm:h-4" />
                                </button>
                            </div>
                            <SourceManager 
                                sources={sources} isOpen={isSourceMenuOpen} onClose={() => setIsSourceMenuOpen(false)} 
                                onToggle={(i) => {
                                    const next = [...sources]; next[i].enabled = !next[i].enabled; 
                                    syncSources(next);
                                }}
                                onRemove={(i) => {
                                    const next = sources.filter((_, idx) => idx !== i); 
                                    syncSources(next);
                                }}
                                onAdd={(p) => {
                                    if (sources.some(s => s.path === p)) return;
                                    const next = [...sources, { path: p, enabled: true }]; 
                                    syncSources(next);
                                }}
                            />
                        </div>

                        <div className="flex items-center gap-2">
                            <button 
                                onClick={() => setLayoutType(prev => prev === 'grid' ? 'mosaic' : 'grid')} 
                                className={`w-9 h-9 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all ${layoutType === 'mosaic' ? 'bg-amber-500 text-black shadow-[0_0_20px_rgba(245,158,11,0.4)]' : 'bg-white/5 text-white'}`}
                                title={`Current Layout: ${layoutType === 'grid' ? 'Stable Grid' : 'Dynamic Mosaic'}`}
                            >
                                <LucideIcon name={layoutType === 'grid' ? "layout-grid" : "layout-template"} className="w-4 h-4 sm:w-6 sm:h-6" />
                            </button>

                            <button 
                                onClick={() => { setAutoReflow(prev => { const next = !prev; if (next) generateLayout(); return next; }); }} 
                                className={`w-9 h-9 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all ${autoReflow ? 'bg-amber-500 text-black shadow-[0_0_20px_rgba(245,158,11,0.4)]' : 'bg-white/5 text-white'}`}
                                title={autoReflow ? 'Auto Reflow: ON (click to disable)' : 'Auto Reflow: OFF (click to enable & reflow)'}
                            >
                                <LucideIcon name="refresh-ccw" className="w-4 h-4 sm:w-6 sm:h-6" />
                            </button>

                            <button 
                                onClick={() => setIsMuted(!isMuted)} 
                                className={`w-9 h-9 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all ${!isMuted ? 'bg-amber-500 text-black' : 'bg-white/5 text-white'}`}
                                title={isMuted ? "Unmute Oldest Video" : "Mute All"}
                            >
                                <LucideIcon name={isMuted ? "volume-x" : "volume-2"} className="w-4 h-4 sm:w-6 sm:h-6" />
                            </button>

                            <button onClick={() => setIsPlaying(!isPlaying)} className={`w-9 h-9 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center transition-all ${isPlaying ? 'bg-amber-500 text-black' : 'bg-white/5 text-white'}`}>
                                <LucideIcon name={isPlaying ? "pause" : "play"} className="w-4 h-4 sm:w-6 sm:h-6 fill-current" />
                            </button>
                        </div>

                        <div className="flex items-center">
                            <ControlStepper 
                                label="Density"
                                value={density}
                                onIncrease={() => setDensity(d => Math.min(10, d + 1))}
                                onDecrease={() => setDensity(d => Math.max(1, d - 1))}
                            />

                            <ControlStepper 
                                label="Speed"
                                value={rotationSpeed}
                                suffix="s"
                                onIncrease={() => setRotationSpeed(s => Math.min(300, s + 1))}
                                onDecrease={() => setRotationSpeed(s => Math.max(1, s - 1))}
                            />

                            <ControlStepper 
                                label="Max Video"
                                value={maxDuration}
                                suffix="s"
                                onIncrease={() => setMaxDuration(d => Math.min(600, d + 10))}
                                onDecrease={() => setMaxDuration(d => Math.max(5, d - 10))}
                            />
                        </div>

                        <div className="flex items-center gap-2 sm:gap-4 border-l-0 lg:border-l border-white/10 pl-0 lg:pl-6">
                             <button 
                                onClick={() => setMediaFilter(f => (f + 1) % 3)} 
                                className={`p-1.5 sm:p-2 rounded-xl transition-all ${mediaFilter !== 0 ? 'text-amber-500 bg-amber-500/10' : 'text-slate-500'}`} 
                                title={mediaFilter === 0 ? "Show All Media" : (mediaFilter === 1 ? "Videos Only" : "Images Only")}
                            >
                                <LucideIcon name={mediaFilter === 0 ? "clapperboard" : (mediaFilter === 1 ? "video" : "image")} className="w-4 h-4 sm:w-5 sm:h-5" />
                            </button>
                            <button onClick={() => setImageFit(prev => prev === 'cover' ? 'contain' : 'cover')} className={`p-1.5 sm:p-2 rounded-xl transition-all ${imageFit === 'contain' ? 'text-amber-500 bg-amber-500/10' : 'text-slate-500'}`} title="Toggle Image Fit (Zoom vs Native)">
                                <LucideIcon name={imageFit === 'cover' ? "maximize" : "minimize"} className="w-4 h-4 sm:w-5 sm:h-5" />
                            </button>
                            <button onClick={toggleFullscreen} className="p-1.5 sm:p-2 text-slate-400 hover:text-white">
                                <LucideIcon name={document.fullscreenElement ? "minimize-2" : "expand"} className="w-4 h-4 sm:w-5 sm:h-5" />
                            </button>
                        </div>
                    </div>

                    {/* Loading Overlay */}
                    {isLoading && (
                        <div className="fixed inset-0 z-[200] glass flex flex-col items-center justify-center gap-6">
                            <div className="w-24 h-24 rounded-[2.5rem] bg-gradient-to-br from-amber-400 to-orange-600 flex items-center justify-center animate-spin shadow-2xl">
                                <LucideIcon name="refresh-cw" className="w-12 h-12 text-white" />
                            </div>
                            <div className="text-center">
                                <h1 className="text-2xl font-black text-white mb-2 uppercase tracking-tighter">Initializing Wall...</h1>
                                <p className="text-slate-500 text-sm font-mono truncate max-w-xl px-12">{scanningPath}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
